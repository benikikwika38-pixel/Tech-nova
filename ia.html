<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technova AI 🤖</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: Arial;
}

/* CONTENEUR PLEIN ÉCRAN */
.container {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
h2 {
  margin: 0;
  padding: 15px;
  text-align: center;
  background: #1e293b;
  color: #38bdf8;
}

/* ZONE CHAT */
#chat-box {
  flex: 1;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
}

/* MESSAGES */
.message {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  max-width: 75%;
}

.user {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #334155;
  margin-right: auto;
}

/* INPUT EN BAS */
.input-area {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>Technova AI 🤖</h2>

  <div id="chat-box"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Pose ta question..." />
    <button onclick="sendMessage()">📤</button>
    <button onclick="startVoice()">🎤</button>
  </div>

</div>

<script>

function addMessage(text, sender) {
  const chatBox = document.getElementById("chat-box");
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(message) {
  let response = "";

  if (message.includes("bonjour") || message.includes("salut")) {
    response = "Bonjour 👋 Je suis Technova AI 🤖, comment je peux t'aider ?";
  }
  else if (message.includes("html")) {
    response = "HTML sert à structurer une page web avec des balises comme <div>, <p>, <h1>.";
  }
  else if (message.includes("css")) {
    response = "CSS permet de styliser ton site : couleurs, design, position.";
  }
  else if (message.includes("javascript")) {
    response = "JavaScript rend ton site interactif : boutons, animations.";
  }
  else if (message.includes("site")) {
    response = "Pour créer un site : HTML + CSS + JavaScript.";
  }
  else if (message.includes("ia")) {
    response = "Une IA est un programme capable de simuler l'intelligence humaine.";
  }
  else if (message.includes("python")) {
    response = "Python est un langage utilisé pour IA, web et automatisation.";
  }
  else if (message.includes("createur") || message.includes("qui t'a créé")) {
    response = "J'ai été créé par Béni Kikwika Kambwala 💻🔥";
  }

  // =========================
  // 🔥 TECHNOVA COURS
  // =========================

  else if (message.includes("ordinateur") || message.includes("pc")) {
    response = "Un ordinateur est une machine qui traite des informations grâce au matériel et aux logiciels.";
  }
  else if (message.includes("processeur") || message.includes("cpu")) {
    response = "Le processeur (CPU) est le cerveau de l’ordinateur.";
  }
  else if (message.includes("ram") || message.includes("mémoire")) {
    response = "La RAM est une mémoire temporaire utilisée pour les programmes en cours.";
  }
  else if (message.includes("disque") || message.includes("ssd")) {
    response = "Le disque dur ou SSD stocke les fichiers de façon permanente.";
  }
  else if (message.includes("virus")) {
    response = "Un virus est un logiciel dangereux qui peut infecter ton ordinateur.";
  }
  else if (message.includes("phishing")) {
    response = "Le phishing est une arnaque pour voler tes informations personnelles.";
  }

  else {
    response = "Hmm 🤔 je n'ai pas compris. Pose une question sur l'informatique.";
  }

  setTimeout(() => {
    addMessage(response, "bot");
    speak(response);
  }, 500);
}

function sendMessage() {
  const input = document.getElementById("user-input");
  const message = input.value.toLowerCase();

  if (message.trim() === "") return;

  addMessage(input.value, "user");
  botReply(message);
  input.value = "";
}

// 🎤 VOIX
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "fr-FR";

  recognition.onresult = function(event) {
    const voiceText = event.results[0][0].transcript;
    document.getElementById("user-input").value = voiceText;
    sendMessage();
  };

  recognition.start();
}

// 🔊 VOIX CORRIGÉE ✔
function speak(text) {
  window.speechSynthesis.cancel(); // stop ancienne voix

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "fr-FR";
  speech.rate = 1;
  speech.pitch = 1;

  window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
