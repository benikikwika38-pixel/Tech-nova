<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technova AI 🤖</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: Arial;
}

/* CONTENEUR PLEIN ÉCRAN */
.container {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
h2 {
  margin: 0;
  padding: 15px;
  text-align: center;
  background: #1e293b;
  color: #38bdf8;
}

/* ZONE CHAT */
#chat-box {
  flex: 1;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
}

/* MESSAGES */
.message {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  max-width: 75%;
}

.user {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #334155;
  margin-right: auto;
}

/* INPUT EN BAS */
.input-area {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>Technova AI 🤖</h2>

  <div id="chat-box"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Pose ta question..." />
    <button onclick="sendMessage()">📤</button>
    <button onclick="startVoice()">🎤</button>
  </div>

</div>

<script>

function addMessage(text, sender) {
  const chatBox = document.getElementById("chat-box");
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(message) {
  let response = "";

  if (message.includes("bonjour") || message.includes("salut")) {
    response = "Bonjour 👋 Je suis Technova AI 🤖, comment je peux t'aider ?";
  }
  else if (message.includes("html")) {
    response = "HTML sert à structurer une page web avec des balises comme <div>, <p>, <h1>.";
  }
  else if (message.includes("css")) {
    response = "CSS permet de styliser ton site : couleurs, design, position.";
  }
  else if (message.includes("javascript")) {
    response = "JavaScript rend ton site interactif : boutons, animations.";
  }
  else if (message.includes("site")) {
    response = "Pour créer un site : HTML + CSS + JavaScript.";
  }
  else if (message.includes("ia")) {
    response = "Une IA est un programme capable de simuler l'intelligence humaine.";
  }
  else if (message.includes("python")) {
    response = "Python est un langage utilisé pour IA, web et automatisation.";
  }
  else if (message.includes("createur") || message.includes("qui t'a créé")) {
    response = "J'ai été créé par Béni Kikwika Kambwala 💻🔥";
  }

  // =========================
  // 🔥 AJOUTS TECHNOVA (COURS COMPLET)
  // =========================

  // ORDINATEUR
  else if (message.includes("ordinateur") || message.includes("pc")) {
    response = "Un ordinateur est une machine qui traite des informations grâce au matériel (hardware) et aux logiciels (software).";
  }

  // CPU
  else if (message.includes("processeur") || message.includes("cpu")) {
    response = "Le processeur (CPU) est le cerveau de l’ordinateur. Il exécute toutes les instructions.";
  }

  // RAM
  else if (message.includes("ram") || message.includes("mémoire")) {
    response = "La RAM est une mémoire temporaire qui stocke les programmes en cours d'utilisation.";
  }

  // DISQUE
  else if (message.includes("disque") || message.includes("ssd")) {
    response = "Le disque dur ou SSD est une mémoire permanente où sont stockés les fichiers.";
  }

  // CARTE MÈRE
  else if (message.includes("carte mère")) {
    response = "La carte mère relie tous les composants de l'ordinateur entre eux.";
  }

  // GPU
  else if (message.includes("carte graphique") || message.includes("gpu")) {
    response = "La carte graphique gère l'affichage des images et vidéos.";
  }

  // SYSTEME
  else if (message.includes("windows") || message.includes("linux") || message.includes("macos")) {
    response = "Le système d’exploitation est le logiciel principal qui gère l’ordinateur.";
  }

  // FICHIERS
  else if (message.includes("fichier")) {
    response = "Un fichier est une donnée enregistrée comme un document, image ou vidéo.";
  }

  // DOSSIER
  else if (message.includes("dossier")) {
    response = "Un dossier sert à organiser et regrouper des fichiers.";
  }

  // CORBEILLE
  else if (message.includes("corbeille")) {
    response = "La corbeille stocke temporairement les fichiers supprimés avant leur suppression définitive.";
  }

  // MOT DE PASSE
  else if (message.includes("mot de passe") || message.includes("password")) {
    response = "Un bon mot de passe doit être long, complexe et unique pour chaque compte.";
  }

  // VIRUS
  else if (message.includes("virus") || message.includes("malware")) {
    response = "Les virus sont des programmes malveillants qui peuvent endommager ton ordinateur.";
  }

  // PHISHING
  else if (message.includes("phishing")) {
    response = "Le phishing est une technique de fraude pour voler tes informations personnelles.";
  }

  // ANTIVIRUS
  else if (message.includes("antivirus")) {
    response = "Un antivirus protège ton ordinateur contre les logiciels malveillants.";
  }

  // BACKUP
  else if (message.includes("sauvegarde") || message.includes("backup")) {
    response = "Une sauvegarde permet de protéger tes fichiers en cas de problème.";
  }

  // MISE À JOUR
  else if (message.includes("mise à jour") || message.includes("update")) {
    response = "Les mises à jour corrigent les failles de sécurité et améliorent le système.";
  }

  else {
    response = "Hmm 🤔 je n'ai pas compris. Essaie une question sur l'informatique (CPU, RAM, fichiers, sécurité...).";
  }

  setTimeout(() => {
    addMessage(response, "bot");
    speak(response);
  }, 500);
}

function sendMessage() {
  const input = document.getElementById("user-input");
  const message = input.value.toLowerCase();

  if (message.trim() === "") return;

  addMessage(input.value, "user");
  botReply(message);
  input.value = "";
}

// 🎤 VOIX
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "fr-FR";

  recognition.onresult = function(event) {
    const voiceText = event.results[0][0].transcript;
    document.getElementById("user-input").value = voiceText;
    sendMessage();
  };

  recognition.start();
}

// 🔊 VOIX IA
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "fr-FR";
  window.speechSynthesis.speak(text);
}

</script>

</body>
</html>
