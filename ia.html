<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technova AI 🤖</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: Arial;
}

/* CONTENEUR PLEIN ÉCRAN */
.container {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
h2 {
  margin: 0;
  padding: 15px;
  text-align: center;
  background: #1e293b;
  color: #38bdf8;
}

/* ZONE CHAT */
#chat-box {
  flex: 1;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
}

/* MESSAGES */
.message {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  max-width: 75%;
}

.user {
  background: #2563eb;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #334155;
  margin-right: auto;
}

/* INPUT EN BAS */
.input-area {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>Technova AI 🤖</h2>

  <div id="chat-box"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Pose ta question..." />
    <button onclick="sendMessage()">📤</button>
    <button onclick="startVoice()">🎤</button>
  </div>

</div>

<script>

/* =========================
   🧠 IDENTITÉ DE L'IA
========================= */
const AI_IDENTITY = {
  name: "Technova AI",
  creator: "Béni Kikwika Kambwala",
  purpose: "Aider les étudiants de TechNova Academy à apprendre l'informatique"
};

/* ========================= */

function addMessage(text, sender) {
  const chatBox = document.getElementById("chat-box");
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(message) {
  let response = "";
  let text = message.toLowerCase();

  // =========================
  // 🧠 IDENTITÉ IA
  // =========================

  if (
    text.includes("qui t'a créé") ||
    text.includes("créateur") ||
    text.includes("qui est ton créateur")
  ) {
    response = "J'ai été créé par Béni Kikwika Kambwala 💻🔥, développeur web et créateur de TechNova AI pour aider les étudiants de TechNova Academy.";
  }

  else if (
    text.includes("pourquoi tu as été créé") ||
    text.includes("ton but")
  ) {
    response = "J'ai été créé pour aider les étudiants de TechNova Academy à apprendre l'informatique avec des explications simples et claires.";
  }

  else if (
    text.includes("béni kikwika") ||
    text.includes("parle moi de béni")
  ) {
    response = "Béni Kikwika Kambwala est un développeur web. Il a créé TechNova AI, TechNova Academy, Vortex Voice, Vortex Manage et Ordi Facile pour aider les étudiants dans l'informatique.";
  }

  // =========================
  // 💻 BASE CHAT
  // =========================

  else if (text.includes("bonjour") || text.includes("salut")) {
    response = "Bonjour 👋 Je suis Technova AI 🤖, comment je peux t'aider ?";
  }
  else if (text.includes("html")) {
    response = "HTML sert à structurer une page web avec des balises comme <div>, <p>, <h1>.";
  }
  else if (text.includes("css")) {
    response = "CSS permet de styliser ton site : couleurs, design, position.";
  }
  else if (text.includes("javascript")) {
    response = "JavaScript rend ton site interactif : boutons, animations.";
  }
  else if (text.includes("site")) {
    response = "Pour créer un site : HTML + CSS + JavaScript.";
  }
  else if (text.includes("ia")) {
    response = "Une IA est un programme capable de simuler l'intelligence humaine.";
  }
  else if (text.includes("python")) {
    response = "Python est un langage utilisé pour IA, web et automatisation.";
  }

  // =========================
  // 💻 INFORMATIQUE COURS
  // =========================

  else if (text.includes("ordinateur") || text.includes("pc")) {
    response = "Un ordinateur est une machine qui traite des informations grâce au matériel et aux logiciels.";
  }
  else if (text.includes("processeur") || text.includes("cpu")) {
    response = "Le processeur (CPU) est le cerveau de l’ordinateur.";
  }
  else if (text.includes("ram")) {
    response = "La RAM est une mémoire temporaire utilisée pour les programmes en cours.";
  }
  else if (text.includes("disque") || text.includes("ssd")) {
    response = "Le disque dur ou SSD stocke les fichiers de façon permanente.";
  }
  else if (text.includes("virus")) {
    response = "Un virus est un logiciel malveillant qui peut endommager ton ordinateur.";
  }
  else if (text.includes("phishing")) {
    response = "Le phishing est une arnaque pour voler tes informations personnelles.";
  }
  else if (text.includes("antivirus")) {
    response = "Un antivirus protège ton ordinateur contre les logiciels malveillants.";
  }
  else if (text.includes("sauvegarde") || text.includes("backup")) {
    response = "Une sauvegarde permet de protéger tes fichiers en cas de problème.";
  }

  // =========================
  // ❌ CAS PAR DÉFAUT
  // =========================

  else {
    response = "🤖 Je suis TechNova AI.\nPose une question sur l'informatique, la sécurité ou les cours.";
  }

  setTimeout(() => {
    addMessage(response, "bot");
    speak(response);
  }, 500);
}

function sendMessage() {
  const input = document.getElementById("user-input");
  const message = input.value.toLowerCase();

  if (message.trim() === "") return;

  addMessage(input.value, "user");
  botReply(message);
  input.value = "";
}

// 🎤 VOIX
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "fr-FR";

  recognition.onresult = function(event) {
    const voiceText = event.results[0][0].transcript;
    document.getElementById("user-input").value = voiceText;
    sendMessage();
  };

  recognition.start();
}

// 🔊 VOIX CORRIGÉE ✔
function speak(text) {
  window.speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "fr-FR";
  speech.rate = 1;
  speech.pitch = 1;

  window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
