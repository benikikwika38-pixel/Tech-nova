<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>IA Informatique Avancée</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    text-align: center;
    padding: 20px;
    color: #222;
}
h1 {color:#6a0dad;}
textarea, input {
    width: 90%;
    max-width: 600px;
    padding: 12px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
}
button {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 6px;
    background: #6a0dad;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {background: #4b078c;}
#reponse {
    margin-top: 20px;
    padding: 15px;
    background: #9b59b6;
    color: white;
    border-radius: 10px;
    text-align: left;
    max-width: 90%;
    margin-left: auto;
    margin-right: auto;
    white-space: pre-wrap;
}
</style>
</head>
<body>

<h1>IA Informatique Avancée</h1>

<!-- Login -->
<div id="login">
<h3>Mot de passe pour accéder à l'IA</h3>
<input type="password" id="passGeneral" placeholder="Mot de passe">
<br>
<button onclick="entrer()">Entrer</button>
</div>

<!-- Menu IA -->
<div id="menu" style="display:none">
<p>Pose ta question ou colle ton code :</p>
<textarea id="question" rows="8" placeholder="Ex: Mon code Python plante…"></textarea>
<br>
<button onclick="resoudreAvance()">Résoudre</button>
<div id="reponse">La réponse apparaîtra ici...</div>
</div>

<script>
// Mot de passe général
const motPasseGeneral="INFORMATIQUE123";

// Entrée mot de passe
function entrer(){
    let code=document.getElementById("passGeneral").value.trim();
    if(code===motPasseGeneral){
        document.getElementById("login").style.display="none";
        document.getElementById("menu").style.display="block";
    } else {
        alert("Mot de passe incorrect");
    }
}

// Détection simple du langage
function detecterLangage(code) {
    code = code.toLowerCase();
    if(code.includes("def ") || code.includes("print(")) return "Python";
    if(code.includes("console.log") || code.includes("function")) return "JavaScript";
    if(code.includes("<html") || code.includes("<div")) return "HTML/CSS";
    if(code.includes("int main") || code.includes("#include")) return "C/C++";
    return "Inconnu";
}

// Simulation IA avancée
function resoudreAvance() {
    let question = document.getElementById("question").value.trim();
    if(!question) {
        alert("Tape ta question ou colle ton code !");
        return;
    }

    let reponseDiv = document.getElementById("reponse");
    reponseDiv.innerText = "Analyse en cours...";

    setTimeout(() => {
        let langage = detecterLangage(question);
        reponseDiv.innerText = "💻 Langage détecté : " + langage + "\n\n" +
        "🔹 Analyse du code / question :\n" + question + "\n\n" +
        "💡 Solution possible :\n" +
        "[L'IA analyserait ici le code ou la question et proposerait une solution étape par étape]\n\n" +
        "📖 Explication détaillée :\n" +
        "[L'IA expliquerait comment résoudre l'erreur ou améliorer le code pas à pas].";
    }, 1200);
}
</script>

</body>
</html>
