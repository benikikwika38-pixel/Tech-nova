<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#18191a;color:white;}
header{background:#242526;padding:15px;text-align:center;}

.box{background:#242526;margin:10px;padding:10px;border-radius:10px;}

input{width:100%;padding:10px;border:none;border-radius:8px;}
button{padding:10px;border:none;border-radius:8px;background:#2374e1;color:white;margin-top:5px;}

.post{margin-top:10px;padding:10px;border-bottom:1px solid #333;}
.comment{font-size:12px;margin-left:10px;color:#ccc;}
</style>
</head>

<body>

<header>
🌐 TechNova Social  
<br>
<button onclick="goChat()">💬 Chat</button>
</header>

<div class="box" id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Entrer</button>
<button onclick="signup()">Créer compte</button>
</div>

<div id="app" style="display:none;">

<!-- PROFILE -->
<div class="box">
<h3>👤 Profil</h3>
<input id="name" placeholder="Nom">
<input id="avatar" placeholder="URL photo">
<button onclick="saveProfile()">Enregistrer</button>
</div>

<!-- POST -->
<div class="box">
<input id="postInput" placeholder="Quoi de neuf ?">
<button onclick="addPost()">Publier</button>
</div>

<!-- POSTS -->
<div class="box">
<div id="posts"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let me="";
const posts=document.getElementById("posts");

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;
    loginBox.style.display="none";
    app.style.display="block";
    loadPosts();
  });
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value);
}

/* PROFILE */
function saveProfile(){
  db.collection("users").doc(me).set({
    name:name.value,
    avatar:avatar.value
  });
}

/* POST */
function addPost(){
  db.collection("posts").add({
    user:me,
    text:postInput.value,
    time:Date.now(),
    likes:[]
  });
  postInput.value="";
}

/* LOAD POSTS */
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(async snap=>{
    posts.innerHTML="";

    for(const doc of snap.docs){
      let p=doc.data();

      let user=await db.collection("users").doc(p.user).get();
      let name=user.data()?.name||p.user;

      posts.innerHTML+=`
      <div class="post">
        <b>${name}</b><br>${p.text}<br>

        <button onclick="likePost('${doc.id}')">
          👍 ${p.likes.length}
        </button>

        <br><input placeholder="Commenter..." 
        onkeydown="addComment(event,'${doc.id}')">

        <div id="c_${doc.id}"></div>
      </div>
      `;

      loadComments(doc.id);
    }
  });
}

/* LIKE */
function likePost(id){
  let ref=db.collection("posts").doc(id);
  ref.get().then(doc=>{
    let likes=doc.data().likes||[];
    if(likes.includes(me)){
      likes=likes.filter(l=>l!==me);
    }else{
      likes.push(me);
    }
    ref.update({likes});
  });
}

/* COMMENT */
function addComment(e,id){
  if(e.key==="Enter"){
    db.collection("posts").doc(id)
    .collection("comments")
    .add({
      user:me,
      text:e.target.value
    });
    e.target.value="";
  }
}

function loadComments(id){
  db.collection("posts").doc(id)
  .collection("comments")
  .onSnapshot(snap=>{
    let box=document.getElementById("c_"+id);
    if(!box) return;
    box.innerHTML="";
    snap.forEach(doc=>{
      let c=doc.data();
      box.innerHTML+=`<div class="comment">${c.user}: ${c.text}</div>`;
    });
  });
}

/* NAV */
function goChat(){
  window.location.href="index.html";
}
</script>

</body>
</html>
