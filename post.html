<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WhatsApp ULTRA NEXT LEVEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#e9edf1;
}

header{
  background:#0a5bd3;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.box{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.chatBox{
  height:320px;
  overflow:auto;
  background:white;
  padding:10px;
  border-radius:12px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#cfe6ff;margin-left:auto;text-align:right;}
.other{background:#eee;}

.small{
  font-size:12px;
  color:gray;
}

.user{
  padding:8px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
</style>
</head>

<body>

<header>📱 WhatsApp ULTRA NEXT LEVEL 🔥</header>

<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none;">

  <div class="box">
    <h3>👥 Utilisateurs</h3>
    <div id="users"></div>
  </div>

  <div class="box">
    <h3>💬 Chat privé</h3>
    <div class="chatBox" id="chatBox"></div>
  </div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let chatWith="";

/* 🔥 CREATE USER AUTO */
function createUserIfNotExists(){

  const ref = db.collection("users").doc(me);

  ref.get().then(doc=>{
    if(!doc.exists){
      ref.set({
        email: me,
        lastSeen: Date.now()
      });
    }
  });

}

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  )
  .then(u=>{
    me=u.user.email;

    createUserIfNotExists(); // 🔥 correction

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadUsers();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* USERS LIST */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(doc=>{
      let u=doc.id;

      if(u===me) return;

      box.innerHTML+=`
        <div class="user" onclick="selectUser('${u}')">
          👤 ${u}
        </div>
      `;
    });
  });
}

/* SELECT USER */
function selectUser(user){
  chatWith=user;
  loadChat();
}

/* SEND MSG */
function sendMsg(){

  if(!chatWith){
    alert("Choisis un utilisateur !");
    return;
  }

  const text=document.getElementById("msg").value;
  if(!text) return;

  db.collection("chats").add({
    text,
    from:me,
    to:chatWith,
    time:Date.now(),
    seen:false
  });

  document.getElementById("msg").value="";
}

/* LOAD CHAT PRIVÉ */
function loadChat(){

  db.collection("chats")
  .orderBy("time")
  .onSnapshot(snap=>{

    let box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();

      if(
        (m.from===me && m.to===chatWith) ||
        (m.from===chatWith && m.to===me)
      ){

        let status = m.seen ? "✔✔ vu" : "✔ envoyé";

        box.innerHTML+=`
          <div class="msg ${m.from===me?'me':'other'}">
            ${m.text}
            <div class="small">${status}</div>
          </div>
        `;

        if(m.to===me){
          db.collection("chats").doc(doc.id).update({seen:true});
        }

      }

    });

  });
}

/* ONLINE */
function presence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

</script>

</body>
</html>
