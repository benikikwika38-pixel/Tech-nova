<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}

.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg{
  padding:6px;
  margin:5px;
  border-radius:8px;
}

.me{ background:#d1e7ff; text-align:right; }
.other{ background:#eee; }

img.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion TechNova</h3>
  <input id="name" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- 👤 PROFIL -->
<div class="box">
  <h3>👤 Ton profil</h3>

  <input id="username" placeholder="Nom affiché">
  <input id="bio" placeholder="Bio">
  <input type="file" id="avatar">

  <button onclick="saveProfile()">💾 Sauvegarder profil</button>

  <div id="myProfile"></div>
</div>

<!-- POSTS -->
<div id="postsSection">

  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <input type="file" id="postImage">
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

  <div class="box">
    <h3>👥 Étudiants</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "TA_KEY",
  authDomain: "TON_DOMAIN",
  projectId: "TON_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= VARIABLES ================= */
let me = "";
let profile = {};

/* ================= LOGIN ================= */
function login(){

  const email = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .then(user=>{

    me = user.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    startPresence();
    loadPosts();
    loadUsers();
    loadProfile();

  })
  .catch(err=>alert(err.message));
}

/* ================= SIGNUP ================= */
function signup(){

  const email = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>alert("Compte créé"))
  .catch(err=>alert(err.message));
}

/* ================= PROFIL ================= */
function saveProfile(){

  const name = document.getElementById("username").value;
  const bio = document.getElementById("bio").value;
  const file = document.getElementById("avatar").files[0];

  const save = (img="")=>{

    profile = {name,bio,avatar:img};

    db.collection("users").doc(me).set({
      email: me,
      name,
      bio,
      avatar: img,
      lastSeen: Date.now()
    });

    loadProfile();
  };

  if(file){
    const reader = new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save(profile.avatar);
}

function loadProfile(){

  db.collection("users").doc(me).get()
  .then(doc=>{

    if(!doc.exists) return;

    const u = doc.data();

    document.getElementById("myProfile").innerHTML=`
      <div class="post">
        <img class="avatar" src="${u.avatar||''}">
        <b>${u.name||u.email}</b>
        <p>${u.bio||''}</p>
      </div>
    `;
  });
}

/* ================= POSTS ================= */
function addPost(){

  const text = document.getElementById("postText").value;
  const file = document.getElementById("postImage").files[0];

  const save = (img="")=>{
    db.collection("posts").add({
      text,
      image: img,
      user: me,
      likes: 0,
      time: Date.now()
    });
  };

  if(file){
    const reader = new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save();

}

function loadPosts(){

  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{

    const feed=document.getElementById("feed");
    feed.innerHTML="";

    snap.forEach(doc=>{

      const p=doc.data();

      feed.innerHTML+=`
        <div class="post">
          <b>${p.user}</b>
          <p>${p.text}</p>
          ${p.image?`<img src="${p.image}" style="width:100%">`:``}
          ❤️ ${p.likes||0}
        </div>
      `;

    });

  });
}

/* ================= USERS ================= */
function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    const box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(doc=>{

      const u=doc.data();
      const online = Date.now()-u.lastSeen<5000;

      box.innerHTML+=`
        <div>
          <img class="avatar" src="${u.avatar||''}">
          ${u.name||u.email} ${online?"🟢":"⚫"}
        </div>
      `;
    });

  });
}

function startPresence(){

  setInterval(()=>{

    if(me){
      db.collection("users").doc(me).update({
        lastSeen:Date.now()
      }).catch(()=>{});
    }

  },3000);
}

/* ================= CHAT ================= */
function sendMsg(){

  const text=document.getElementById("msg").value;
  if(!text) return;

  db.collection("chats").add({
    text,
    from:me,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

</script>

</body>
  </html>
