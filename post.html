<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

/* HEADER */
header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

/* BOX */
.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

/* POST */
.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

/* COMMENT */
.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
  font-size:13px;
}

/* CHAT */
.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg{
  padding:6px;
  margin:5px;
  border-radius:8px;
}

.me{
  background:#d1e7ff;
  text-align:right;
}

.other{
  background:#eee;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO</header>

<!-- NAVIGATION -->
<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion</h3>
  <input id="name" placeholder="Nom">
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- POSTS -->
<div id="postsSection">

  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

  <div class="box">
    <h3>👥 Étudiants</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>
  <button onclick="startVoice()">🎤</button>

</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "TA_KEY",
  authDomain: "TON_DOMAIN",
  projectId: "TON_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let me = "";
let selected = "";

/* LOGIN */
function login(){

  me = document.getElementById("name").value;

  if(!me) return;

  db.collection("users").doc(me).set({
    name: me,
    online: true,
    lastSeen: Date.now()
  });

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadPosts();
  loadUsers();
}

/* NAV */
function show(page){
  document.getElementById("postsSection").style.display = page==='posts'?'block':'none';
  document.getElementById("chatSection").style.display = page==='chat'?'block':'none';
}

/* ================= POSTS ================= */

/* ➕ POST */
function addPost(){

  const text = document.getElementById("postText").value;

  db.collection("posts").add({
    text,
    user: me,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
}

/* 📡 LOAD POSTS */
function loadPosts(){

  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      feed.innerHTML += `
        <div class="post">

          <b>${p.user}</b>
          <p>${p.text}</p>

          <button onclick="like('${doc.id}',${p.likes})">
            ❤️ ${p.likes}
          </button>

          <input id="c-${doc.id}" placeholder="Commenter">
          <button onclick="comment('${doc.id}')">Envoyer</button>

          <div id="comments-${doc.id}"></div>

        </div>
      `;

      loadComments(doc.id);
    });

  });
}

/* ❤️ LIKE */
function like(id, likes){
  db.collection("posts").doc(id).update({
    likes: likes + 1
  });
}

/* 💬 COMMENT */
function comment(id){

  const input = document.getElementById("c-"+id);

  db.collection("posts")
  .doc(id)
  .collection("comments")
  .add({
    text: input.value,
    user: me,
    time: Date.now()
  });

  input.value = "";
}

/* LOAD COMMENTS */
function loadComments(id){

  db.collection("posts")
  .doc(id)
  .collection("comments")
  .onSnapshot(snap=>{

    const box = document.getElementById("comments-"+id);
    box.innerHTML = "";

    snap.forEach(d=>{
      const c = d.data();

      box.innerHTML += `
        <div class="comment">
          <b>${c.user}</b>: ${c.text}
        </div>
      `;
    });

  });
}

/* ================= CHAT ================= */

/* USERS */
function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    const box = document.getElementById("users");
    box.innerHTML = "";

    snap.forEach(d=>{
      const u = d.data();

      if(u.name !== me){

        box.innerHTML += `
          <div onclick="openChat('${u.name}')">
            👤 ${u.name} ${u.online?"🟢":"⚫"}
          </div>
        `;
      }
    });

  });
}

/* CHAT ID */
function chatId(a,b){
  return [a,b].sort().join("_");
}

/* OPEN CHAT */
function openChat(u){
  selected = u;
  loadMessages();
}

/* SEND MSG */
function sendMsg(){

  const text = document.getElementById("msg").value;
  if(!text || !selected) return;

  db.collection("chats")
  .doc(chatId(me,selected))
  .collection("messages")
  .add({
    text,
    from: me,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

/* LOAD MSG */
function loadMessages(){

  db.collection("chats")
  .doc(chatId(me,selected))
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{

    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    snap.forEach(d=>{
      const m = d.data();

      box.innerHTML += `
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
        </div>
      `;
    });

  });
}

/* OFFLINE */
window.onbeforeunload = () => {
  db.collection("users").doc(me).update({
    online:false,
    lastSeen:Date.now()
  });
};

</script>

</body>
</html>
