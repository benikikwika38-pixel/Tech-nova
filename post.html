<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova WhatsApp PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.box{
  background:white;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}

img.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>📘 WhatsApp PRO MAX 🔥</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="name" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none;">

  <!-- PROFIL -->
  <div class="box">
    <h3>Profil</h3>
    <input id="username" placeholder="Nom">
    <input id="bio" placeholder="Bio">
    <input type="file" id="avatar">
    <button onclick="saveProfile()">Sauvegarder</button>
    <div id="myProfile"></div>
  </div>

  <!-- POSTS -->
  <div id="postsSection">
    <div class="box">
      <textarea id="postText" placeholder="Exprime-toi..."></textarea>
      <input type="file" id="postImage">
      <button onclick="addPost()">Publier</button>
    </div>

    <div id="feed"></div>
  </div>

  <!-- CHAT -->
  <div id="chatSection" style="display:none;">
    <div class="box">
      <h3>Chat</h3>
      <div id="chatBox"></div>
    </div>

    <input id="msg" placeholder="Message">
    <button onclick="sendMsg()">Envoyer</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me = "";

/* ================= LOGIN ================= */
function login(){
  const email = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(user=>{
    me = user.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadPosts();
    loadProfile();
  })
  .catch(err=>alert(err.message));
}

/* ================= PROFILE ================= */
function saveProfile(){
  const name=document.getElementById("username").value;
  const bio=document.getElementById("bio").value;
  const file=document.getElementById("avatar").files[0];

  const ref = db.collection("users").doc(me);

  const save = (img="")=>{
    ref.set({
      name,
      bio,
      avatar:img,
      lastSeen:Date.now()
    }, {merge:true});
  };

  if(file){
    const reader=new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save();
}

function loadProfile(){
  db.collection("users").doc(me).onSnapshot(doc=>{
    if(!doc.exists) return;
    const u = doc.data();

    document.getElementById("myProfile").innerHTML=`
      <div class="post">
        <img class="avatar" src="${u.avatar||''}">
        <b>${u.name||me}</b>
        <p>${u.bio||''}</p>
      </div>
    `;
  });
}

/* ================= POSTS + FIX LOADPOSTS ================= */
function addPost(){
  const text=document.getElementById("postText").value;
  const file=document.getElementById("postImage").files[0];

  const save=(img="")=>{
    db.collection("posts").add({
      text,
      image:img,
      user:me,
      likes:0,
      time:Date.now()
    });
  };

  if(file){
    const reader=new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save("");
}

/* ✅ FIX IMPORTANT : loadPosts rétabli */
function loadPosts(){

  db.collection("posts")
  .orderBy("time","desc")
  .onSnapshot(snap=>{

    const feed=document.getElementById("feed");
    feed.innerHTML="";

    snap.forEach(doc=>{
      const p = doc.data();

      feed.innerHTML+=`
        <div class="post">
          <b>${p.user}</b>
          <p>${p.text}</p>

          ${p.image ? `<img src="${p.image}" style="width:100%">` : ""}

          <div>
            ❤️ ${p.likes||0}
            <button onclick="like('${doc.id}',${p.likes||0})">Like</button>
          </div>

          <input id="c-${doc.id}" placeholder="commentaire">
          <button onclick="comment('${doc.id}')">Envoyer</button>

          <div id="comments-${doc.id}"></div>
        </div>
      `;

      loadComments(doc.id);
    });

  });
}

function like(id,l){
  db.collection("posts").doc(id).update({
    likes:l+1
  });
}

/* ================= COMMENTS ================= */
function comment(id){
  const input=document.getElementById("c-"+id);
  if(!input.value) return;

  db.collection("posts").doc(id)
  .collection("comments").add({
    text:input.value,
    user:me,
    time:Date.now()
  });

  input.value="";
}

function loadComments(id){
  db.collection("posts").doc(id)
  .collection("comments")
  .onSnapshot(snap=>{
    const box=document.getElementById("comments-"+id);
    if(!box) return;

    box.innerHTML="";
    snap.forEach(d=>{
      box.innerHTML+=`
        <div class="comment">
          <b>${d.data().user}</b>: ${d.data().text}
        </div>
      `;
    });
  });
}

/* ================= CHAT ================= */
function sendMsg(){
  const text=document.getElementById("msg").value;
  if(!text) return;

  db.collection("chats").add({
    text,
    from:me,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

/* ================= NAV ================= */
function show(page){
  document.getElementById("postsSection").style.display=page==='posts'?'block':'none';
  document.getElementById("chatSection").style.display=page==='chat'?'block':'none';
}

</script>

</body>
</html>
