<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova ULTRA WhatsApp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef0f3;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#f0f2f5;
  padding:5px;
  margin-top:5px;
  border-radius:6px;
}

.chatBox{
  height:300px;
  overflow:auto;
  background:#e5ddd5;
  padding:10px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#dcf8c6;margin-left:auto;}
.other{background:white;}

img.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>📘 TechNova ULTRA</header>

<div class="nav">
<button onclick="show('posts')">Posts</button>
<button onclick="show('chat')">Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- PROFILE -->
<div class="box">
  <h3>Profil</h3>
  <input id="username" placeholder="Nom">
  <input id="bio" placeholder="Bio">
  <input type="file" id="avatar">
  <button onclick="saveProfile()">Sauvegarder</button>
  <div id="profile"></div>
</div>

<!-- POSTS -->
<div id="postsSection">
  <div class="box">
    <textarea id="postText"></textarea>
    <button onclick="addPost()">Publier</button>
  </div>
  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">
  <div class="box">
    <h3>Utilisateurs</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>
  <input id="msg">
  <button onclick="sendMsg()">Envoyer</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
authDomain:"technova-academy.firebaseapp.com",
projectId:"technova-academy",
storageBucket:"technova-academy.appspot.com",
messagingSenderId:"321716769948",
appId:"1:321716769948:web:c8e2d7a4d3e6be795e0959"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me = "";

/* LOGIN */
function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(u=>{
  me=u.user.email;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  loadProfile();
  loadPosts();
  loadUsers();
  loadChat();
  setOnline();
});
}

/* PROFILE */
function saveProfile(){
const name=document.getElementById("username").value;
const bio=document.getElementById("bio").value;
const file=document.getElementById("avatar").files[0];

const ref=db.collection("users").doc(me);

ref.get().then(doc=>{
const old=doc.exists?doc.data():{};

const save=(img="")=>{
ref.set({
name:name||old.name||me,
bio:bio||old.bio||"",
avatar:img||old.avatar||"",
online:true,
lastSeen:Date.now()
},{merge:true});
};

if(file){
const r=new FileReader();
r.onload=()=>save(r.result);
r.readAsDataURL(file);
}else save();
});
}

function loadProfile(){
db.collection("users").doc(me).onSnapshot(doc=>{
if(!doc.exists)return;
const u=doc.data();

document.getElementById("profile").innerHTML=`
<div class="post">
<img class="avatar" src="${u.avatar||''}">
<b>${u.name}</b>
<p>${u.bio}</p>
</div>`;
});
}

/* POSTS */
function addPost(){
const text=document.getElementById("postText").value;

db.collection("posts").add({
text,
user:me,
likes:0,
time:Date.now()
});
}

function loadPosts(){
db.collection("posts").orderBy("time","desc")
.onSnapshot(snap=>{
const feed=document.getElementById("feed");
feed.innerHTML="";

snap.forEach(doc=>{
const p=doc.data();

feed.innerHTML+=`
<div class="post">
<b>${p.user}</b>
<p>${p.text}</p>
❤️ ${p.likes}
<button onclick="like('${doc.id}',${p.likes})">Like</button>
</div>`;
});
});
}

function like(id,l){
db.collection("posts").doc(id).update({likes:l+1});
}

/* USERS ONLINE */
function loadUsers(){
db.collection("users").onSnapshot(snap=>{
const box=document.getElementById("users");
box.innerHTML="";

snap.forEach(d=>{
const u=d.data();
const online=Date.now()-u.lastSeen<5000;

box.innerHTML+=`
<div>
<img class="avatar" src="${u.avatar||''}">
${u.name} ${online?"🟢":"⚫"}
</div>`;
});
});
}

/* CHAT PRIVATE SIMPLE */
function sendMsg(){
const text=document.getElementById("msg").value;
if(!text)return;

db.collection("chats").add({
text,
from:me,
time:Date.now(),
seenBy:[]
});
document.getElementById("msg").value="";
}

function loadChat(){
db.collection("chats").orderBy("time")
.onSnapshot(snap=>{
const box=document.getElementById("chatBox");
box.innerHTML="";

snap.forEach(doc=>{
const m=doc.data();
const isMe=m.from===me;

let check="✓";

if(m.seenBy && m.seenBy.includes(me)){
check="✓✓ 🔵";
}

box.innerHTML+=`
<div class="${isMe?'msg me':'msg other'}">
${m.text}
<div style="font-size:10px">${isMe?check:""}</div>
</div>`;
});
});
}

/* MARK SEEN */
function markSeen(){
db.collection("chats").get().then(snap=>{
snap.forEach(d=>{
const m=d.data();
if(m.from!==me){
db.collection("chats").doc(d.id).update({
seenBy:firebase.firestore.FieldValue.arrayUnion(me)
});
}
});
});
}

/* ONLINE */
function setOnline(){
setInterval(()=>{
db.collection("users").doc(me).set({
lastSeen:Date.now()
},{merge:true});
},5000);
}

/* NAV */
function show(p){
document.getElementById("postsSection").style.display=p==='posts'?'block':'none';
document.getElementById("chatSection").style.display=p==='chat'?'block':'none';
}

</script>

</body>
</html>
