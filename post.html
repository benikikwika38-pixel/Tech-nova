<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Social</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  max-width:650px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, button, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#1877f2;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}

.chat{
  height:200px;
  overflow:auto;
  border:1px solid #ddd;
  padding:5px;
}

.msg{
  background:#e4e6eb;
  padding:6px;
  margin:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>📘 TechNova Social</header>

<div class="container">

<!-- AUTH -->
<div class="box" id="authBox">
  <h3>🔐 Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>

  <h4>Créer compte</h4>
  <input id="name" placeholder="Nom">
  <button onclick="register()">S'inscrire</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- USER -->
<div class="box">
  <h3 id="userName"></h3>
</div>

<!-- POST -->
<div class="box">
  <h3>📢 Publication</h3>
  <textarea id="postText" placeholder="Quoi de neuf ?"></textarea>
  <button onclick="addPost()">Publier</button>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- CHAT -->
<div class="box">
  <h3>💬 Messenger</h3>

  <div class="chat" id="chat"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>
</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = "";

/* 🔐 REGISTER */
function register(){
  const email = email.value;
  const pass = password.value;
  const name = document.getElementById("name").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(user=>{
    db.collection("users").doc(user.user.uid).set({
      name
    });
  });
}

/* 🔐 LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass);
}

/* SESSION */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user.uid;

    db.collection("users").doc(user.uid).get()
    .then(doc=>{
      document.getElementById("userName").innerText = doc.data().name;
    });

    authBox.style.display = "none";
    app.style.display = "block";

    loadPosts();
    loadMessages();
  }
});

/* ➕ POST */
function addPost(){
  const text = document.getElementById("postText").value;

  db.collection("posts").add({
    text,
    userId: currentUser,
    time: Date.now(),
    likes: 0
  });

  document.getElementById("postText").value = "";
}

/* 📡 POSTS */
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    feed.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      db.collection("users").doc(p.userId).get()
      .then(u=>{
        feed.innerHTML += `
          <div class="post">
            <strong>👤 ${u.data().name}</strong>
            <p>${p.text}</p>
            <button onclick="likePost('${doc.id}', ${p.likes||0})">
              ❤️ ${p.likes||0}
            </button>
          </div>
        `;
      });
    });
  });
}

/* ❤️ LIKE */
function likePost(id, likes){
  db.collection("posts").doc(id).update({
    likes: likes + 1
  });
}

/* 💬 CHAT */
function sendMsg(){
  const text = document.getElementById("msg").value;

  db.collection("messages").add({
    text,
    userId: currentUser,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

/* 📡 MESSAGES */
function loadMessages(){
  db.collection("messages").orderBy("time","asc")
  .onSnapshot(snap=>{
    chat.innerHTML = "";

    snap.forEach(doc=>{
      const m = doc.data();

      db.collection("users").doc(m.userId).get()
      .then(u=>{
        chat.innerHTML += `
          <div class="msg">
            <strong>${u.data().name}</strong>: ${m.text}
          </div>
        `;
      });
    });
  });
}

</script>

</body>
</html>
