<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
  font-size:13px;
}

.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg{
  padding:6px;
  margin:5px;
  border-radius:8px;
}

.me{ background:#d1e7ff; text-align:right; }
.other{ background:#eee; }

img.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion TechNova</h3>
  <input id="name" placeholder="Email ou admin">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- 👤 PROFIL -->
<div class="box">
  <h3>👤 Profil utilisateur</h3>

  <input id="username" placeholder="Nom affiché">
  <input id="bio" placeholder="Bio">
  <input type="file" id="avatar">

  <button onclick="saveProfile()">💾 Sauvegarder profil</button>

  <div id="myProfile"></div>
</div>

<!-- POSTS -->
<div id="postsSection">

  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <input type="file" id="postImage">
    <button onclick="addPost()">📤 Publier</button>
  </div>

  <div id="feed"></div>

</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

  <div class="box">
    <h3>👥 Étudiants</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= VARIABLES ================= */
let me = "";
let selected = "";
let isAdmin = false;

/* ================= LOGIN ================= */
function login(){

  const email = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  if(email === "admin" && password === "jemima"){
    me = "ADMIN";
    isAdmin = true;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadPosts();
    loadUsers();
    loadProfile();
    return;
  }

  auth.signInWithEmailAndPassword(email,password)
  .then(user=>{

    me = user.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    startPresence();
    loadPosts();
    loadUsers();
    loadProfile();

  })
  .catch(err=>alert(err.message));
}

/* ================= SIGNUP ================= */
function signup(){
  const email=document.getElementById("name").value;
  const password=document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .then(()=>alert("Compte créé"))
  .catch(err=>alert(err.message));
}

/* ================= PROFILE ================= */
function saveProfile(){

  const name=document.getElementById("username").value;
  const bio=document.getElementById("bio").value;
  const file=document.getElementById("avatar").files[0];

  const save=(img="")=>{

    db.collection("users").doc(me).set({
      name,
      bio,
      avatar:img,
      lastSeen:Date.now()
    })
    .then(()=>{
      loadProfile();
    })
    .catch(err=>{
      alert("Erreur profil: " + err.message);
    });

  };

  if(file){
    const reader=new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save();
}

function loadProfile(){

  if(!me) return;

  db.collection("users").doc(me).get()
  .then(doc=>{
    if(!doc.exists) return;

    const u=doc.data();

    document.getElementById("myProfile").innerHTML=`
      <div class="post">
        <img class="avatar" src="${u.avatar||''}">
        <b>${u.name||u.email||me}</b>
        <p>${u.bio||''}</p>
      </div>
    `;
  });
}

/* ================= POSTS FIXED ================= */
function addPost(){

  const text=document.getElementById("postText").value;
  const file=document.getElementById("postImage").files[0];

  if(!text && !file){
    alert("Écris quelque chose !");
    return;
  }

  const save=(img="")=>{

    db.collection("posts").add({
      text:text||"",
      image:img||"",
      user:me||"unknown",
      likes:0,
      time:Date.now()
    })
    .then(()=>{
      document.getElementById("postText").value="";
      document.getElementById("postImage").value="";
      console.log("Post publié ✅");
    })
    .catch(err=>{
      alert("Erreur publication: " + err.message);
    });

  };

  if(file){
    const reader=new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save("");
}

function loadPosts(){

  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{

    const feed=document.getElementById("feed");
    feed.innerHTML="";

    snap.forEach(doc=>{
      const p=doc.data();

      feed.innerHTML+=`
        <div class="post">

          <b>${p.user}</b>
          <p>${p.text||""}</p>

          ${p.image?`<img src="${p.image}" style="width:100%">`:``}

          ❤️ ${p.likes||0}
          <button onclick="like('${doc.id}',${p.likes||0})">Like</button>

          <input id="c-${doc.id}" placeholder="comment...">
          <button onclick="comment('${doc.id}')">💬</button>

          <div id="comments-${doc.id}"></div>
        </div>
      `;

      loadComments(doc.id);
    });

  });
}

/* ================= LIKE ================= */
function like(id,likes){
  db.collection("posts").doc(id).update({
    likes:likes+1
  });
}

/* ================= COMMENT ================= */
function comment(id){

  const input=document.getElementById("c-"+id);
  if(!input || !input.value) return;

  db.collection("posts").doc(id)
  .collection("comments").add({
    text:input.value,
    user:me,
    time:Date.now()
  });

  input.value="";
}

function loadComments(id){

  db.collection("posts").doc(id)
  .collection("comments")
  .onSnapshot(snap=>{

    const box=document.getElementById("comments-"+id);
    if(!box) return;

    box.innerHTML="";

    snap.forEach(d=>{
      const c=d.data();

      box.innerHTML+=`
        <div class="comment">
          <b>${c.user}</b>: ${c.text}
        </div>
      `;
    });

  });
}

/* ================= USERS ================= */
function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    const box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(d=>{
      const u=d.data();
      const online=Date.now()-u.lastSeen<5000;

      box.innerHTML+=`
        <div>
          <img class="avatar" src="${u.avatar||''}">
          👤 ${u.name||u.email} ${online?"🟢":"⚫"}
        </div>
      `;
    });

  });
}

function startPresence(){

  setInterval(()=>{

    if(me){
      db.collection("users").doc(me).set({
        name:me,
        lastSeen:Date.now()
      }).catch(()=>{});
    }

  },3000);
}

/* ================= NAV ================= */
function show(page){
  document.getElementById("postsSection").style.display=page==='posts'?'block':'none';
  document.getElementById("chatSection").style.display=page==='chat'?'block':'none';
}

</script>

</body>
    </html>
