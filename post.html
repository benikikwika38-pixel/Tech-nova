<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Academy</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
}

.box {
  max-width: 400px;
  margin: 15px auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

button, input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

#app {
  display: none;
}
</style>
</head>

<body>

<!-- CHOIX -->
<div class="box">
  <h3>Connexion</h3>
  <button onclick="showStudent()">Étudiant</button>
  <button onclick="showAdmin()">Admin</button>
</div>

<!-- LOGIN ETUDIANT -->
<div class="box" id="studentBox">
  <h3>Connexion Étudiant</h3>
  <input id="mat" placeholder="Matricule">
  <input id="pass" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- INSCRIPTION -->
<div class="box">
  <h3>Créer compte</h3>
  <input id="rmat" placeholder="Matricule">
  <input id="rname" placeholder="Nom">
  <input id="rpass" placeholder="Mot de passe">
  <button onclick="register()">S'inscrire</button>
</div>

<!-- LOGIN ADMIN -->
<div class="box" id="adminBox" style="display:none;">
  <h3>Connexion Admin</h3>
  <input id="adminUser" placeholder="Nom admin">
  <input id="adminPass" type="password" placeholder="Mot de passe">
  <button onclick="adminLogin()">Se connecter</button>
</div>

<!-- APP -->
<div id="app" class="box">

  <h3>📢 Publications</h3>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">
    <textarea id="text" placeholder="Message..."></textarea>
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="posts"></div>

</div>

<!-- FIREBASE STABLE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;

// 🔄 SWITCH
function showStudent(){
  document.getElementById("studentBox").style.display = "block";
  document.getElementById("adminBox").style.display = "none";
}

function showAdmin(){
  document.getElementById("studentBox").style.display = "none";
  document.getElementById("adminBox").style.display = "block";
}

// 🧑‍🎓 INSCRIPTION
function register(){
  const mat = document.getElementById("rmat").value;
  const name = document.getElementById("rname").value;
  const pass = document.getElementById("rpass").value;

  if(!mat || !name || !pass){
    alert("Remplis tous les champs");
    return;
  }

  db.collection("students").doc(mat).set({
    name,
    password: pass
  }).then(()=>{
    alert("Compte créé !");
  });
}

// 🔐 LOGIN ETUDIANT
function login(){
  const mat = document.getElementById("mat").value;
  const pass = document.getElementById("pass").value;

  db.collection("students").doc(mat).get()
  .then(doc=>{
    if(doc.exists && doc.data().password === pass){

      currentUser = mat;

      alert("Bienvenue " + doc.data().name);

      document.getElementById("app").style.display = "block";

      loadPosts();

    } else {
      alert("Erreur login");
    }
  });
}

// 👨‍💻 LOGIN ADMIN
function adminLogin(){
  const user = document.getElementById("adminUser").value;
  const pass = document.getElementById("adminPass").value;

  if(user === "beni" && pass === "admin2026"){
    alert("Bienvenue Admin 🔥");

    document.getElementById("app").style.display = "block";
    document.getElementById("adminPanel").style.display = "block";

    loadPosts();
  } else {
    alert("Accès refusé");
  }
}

// ➕ POST
function addPost(){
  const text = document.getElementById("text").value;

  db.collection("posts").add({
    text,
    time: Date.now()
  });

  document.getElementById("text").value = "";
}

// 📡 LOAD POSTS
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    const container = document.getElementById("posts");
    container.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      container.innerHTML += `<div style="background:#eee;padding:10px;margin-top:10px;">${p.text}</div>`;
    });
  });
}

</script>

</body>
</html>
