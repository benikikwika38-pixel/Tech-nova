<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova freed</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f0f2f5;
}

/* HEADER */
header {
  background: #1877f2;
  padding: 12px;
  color: white;
  position: sticky;
  top: 0;
}

header div {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

/* CONTAINER */
.container {
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

/* POST */
.post {
  background: white;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.post img {
  width: 100%;
  border-radius: 10px;
  margin-top: 8px;
}

/* ACTIONS */
.actions {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #65676b;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  background: #1877f2;
  color: white;
  font-weight: bold;
}

/* BOX */
#loginBox, #registerBox, #chatBox {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div>
    <img src="https://via.placeholder.com/35" style="border-radius:8px;">
    <div>
      <div style="font-weight:bold;">TechNova Academy</div>
      <div style="font-size:12px;">📢 Feed des étudiants</div>
    </div>
  </div>
</header>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h3>Connexion Étudiant</h3>
  <input id="matricule" placeholder="Matricule">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- 🧑‍🎓 INSCRIPTION -->
<div id="registerBox">
  <h3>Créer un compte</h3>
  <input id="r-mat" placeholder="Matricule">
  <input id="r-name" placeholder="Nom">
  <input id="r-pass" type="password" placeholder="Mot de passe">
  <button onclick="register()">S'inscrire</button>
</div>

<!-- 📡 APP -->
<div id="app" style="display:none;">

<div class="container">

<!-- ADMIN -->
<input type="password" id="pass" placeholder="Mot de passe admin">
<textarea id="text" placeholder="Message..."></textarea>
<input type="file" id="image">
<button onclick="addPost()">Publier</button>

<!-- POSTS -->
<div id="posts"></div>

</div>
</div>

<!-- 💬 CHAT -->
<div id="chatBox" style="display:none;">
  <h3>💬 Chat TechNova</h3>
  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>
  <div id="messages"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD = "Tk@2026Nova!";
let currentUser = null;

// 🔐 INSCRIPTION
function register(){
  const mat = document.getElementById("r-mat").value;
  const name = document.getElementById("r-name").value;
  const pass = document.getElementById("r-pass").value;

  if(!mat || !name || !pass){
    alert("Remplis tous les champs");
    return;
  }

  db.collection("students").doc(mat).set({
    name,
    password: pass
  }).then(()=>{
    alert("Compte créé !");
  });
}

// 🔐 LOGIN
function login(){
  const mat = document.getElementById("matricule").value;
  const pass = document.getElementById("password").value;

  if(!mat || !pass){
    alert("Remplis tous les champs");
    return;
  }

  db.collection("students").doc(mat).get()
  .then(doc=>{
    if(doc.exists && doc.data().password === pass){

      currentUser = mat;

      alert("Bienvenue " + doc.data().name);

      document.getElementById("loginBox").style.display = "none";
      document.getElementById("registerBox").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("chatBox").style.display = "block";

      loadPosts();
      loadChat();

    } else {
      alert("Erreur login");
    }
  });
}

// 📸 IMAGE
function toBase64(file, cb){
  const r = new FileReader();
  r.onload = ()=>cb(r.result);
  r.readAsDataURL(file);
}

// ➕ POST ADMIN
function addPost(){
  const pass = document.getElementById("pass").value;

  if(pass !== ADMIN_PASSWORD){
    alert("Accès refusé");
    return;
  }

  const text = document.getElementById("text").value;
  const file = document.getElementById("image").files[0];

  if(file){
    toBase64(file, img=>{
      savePost(text, img);
    });
  } else {
    savePost(text, "");
  }
}

function savePost(text, image){
  db.collection("posts").add({
    text,
    image,
    likes: 0,
    comments: [],
    time: Date.now()
  });
}

// ❤️ LIKE
function likePost(id, likes){
  db.collection("posts").doc(id).update({
    likes: likes + 1
  });
}

// 💬 COMMENTAIRES
function addComment(id){
  const input = document.getElementById("c-"+id);
  const text = input.value;

  db.collection("posts").doc(id).get().then(doc=>{
    let c = doc.data().comments || [];
    c.push(text);

    db.collection("posts").doc(id).update({
      comments: c
    });

    input.value = "";
  });
}

// 📡 POSTS
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    const container = document.getElementById("posts");
    container.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      const div = document.createElement("div");
      div.classList.add("post");

      div.innerHTML = `
        <p>${p.text}</p>
        ${p.image ? `<img src="${p.image}">` : ""}

        <div class="actions">
          <span onclick="likePost('${doc.id}', ${p.likes})">❤️ ${p.likes}</span>
        </div>

        <input id="c-${doc.id}" placeholder="Commentaire">
        <button onclick="addComment('${doc.id}')">Envoyer</button>

        <div>
          ${(p.comments || []).map(c=>`<p>💬 ${c}</p>`).join("")}
        </div>
      `;

      container.appendChild(div);
    });
  });
}

// 💬 CHAT
function sendMsg(){
  const msg = document.getElementById("msg").value;
  if(!msg || !currentUser) return;

  db.collection("messages").add({
    user: currentUser,
    text: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

function loadChat(){
  db.collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(doc=>{
      const m = doc.data();
      box.innerHTML += `<p><b>${m.user}:</b> ${m.text}</p>`;
    });
  });
}

</script>

</body>
</html>
