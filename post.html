<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RS TECHNOVA ACADEMY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
}

header{
  background:#202c33;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.box{
  background:#111b21;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

/* STORIES */
#stories{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.story{
  text-align:center;
  cursor:pointer;
}

.story img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #00a884;
}

/* USERS */
.user{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

/* CHAT */
.chatBox{
  height:320px;
  overflow:auto;
  padding:10px;
}

.msg{
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#005c4b;margin-left:auto;}
.other{background:#202c33;}

.small{font-size:11px;color:#aaa;}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
}

#chatHeader{
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #222;
  padding-bottom:10px;
}

input{
  padding:10px;
  border-radius:20px;
  border:none;
  width:70%;
}

button{
  padding:10px;
  border:none;
  border-radius:20px;
  background:#00a884;
  color:white;
}
</style>
</head>

<body>

<header>RS TECHNOVA ACADEMY🔥</header>

<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <br><br>
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<div id="app" style="display:none;">

<div class="box">
  <h3>👤 Profil</h3>
  <input id="avatarInput" type="file">
  <button onclick="saveAvatar()">Changer photo</button>
  <div id="myAvatar"></div>
</div>

<!-- STORIES -->
<div class="box">
  <h3>📸 Stories</h3>
  <input type="file" id="storyFile">
  <button onclick="addStory()">Publier</button>
  <div id="stories"></div>
</div>

<!-- USERS -->
<div class="box">
  <h3>👥 Utilisateurs</h3>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="box">

<div id="chatHeader">
  <img id="chatAvatar" class="avatar">
  <div>
    <b id="chatName"></b><br>
    <span id="chatStatus" class="small"></span>
  </div>
</div>

<div class="chatBox" id="chatBox"></div>
<div id="typing" class="small"></div>

</div>

<input id="msg" placeholder="Message..." oninput="typing()">
<button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let currentChatUser="";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;
    loginBox.style.display="none";
    app.style.display="block";
    loadUsers();
    loadProfile();
    loadStories();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* SIGNUP */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;
    db.collection("users").doc(me).set({
      email:me,
      avatar:"",
      lastSeen:Date.now()
    });
    alert("Compte créé");
  })
  .catch(e=>alert(e.message));
}

/* PROFILE */
function saveAvatar(){
  let file=avatarInput.files[0];
  let r=new FileReader();
  r.onload=()=>{
    db.collection("users").doc(me).set({avatar:r.result},{merge:true});
  };
  r.readAsDataURL(file);
}

function loadProfile(){
  db.collection("users").doc(me).onSnapshot(doc=>{
    let u=doc.data();
    myAvatar.innerHTML=`<img class="avatar" src="${u.avatar||''}">`;
  });
}

/* USERS */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    users.innerHTML="";
    snap.forEach(doc=>{
      let u=doc.data();
      let online=Date.now()-(u.lastSeen||0)<5000;

      if(u.email!==me){
        users.innerHTML+=`
          <div class="user">
            <div onclick="openChat('${u.email}')">
              ${u.email} ${online?"🟢":""}
            </div>
            <button onclick="openUserStory('${doc.id}')">📸</button>
          </div>
        `;
      }
    });
  });
}

/* CHAT HEADER */
function loadChatHeader(){
  db.collection("users").doc(currentChatUser)
  .onSnapshot(doc=>{
    let u=doc.data();
    let online=Date.now()-(u.lastSeen||0)<5000;

    chatAvatar.src = u.avatar || "";
    chatName.innerText = u.email;
    chatStatus.innerText = online ? "🟢 actif" : "⚫ non actif";
  });
}

/* OPEN CHAT */
function openChat(user){
  currentChatUser=user;
  loadChat();
  loadChatHeader();
}

/* SEND */
function sendMsg(){
  if(!currentChatUser)return alert("Choisis un utilisateur");

  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id).collection("messages").add({
    text:msg.value,
    from:me,
    time:Date.now(),
    seen:false
  });

  msg.value="";
}

/* CHAT */
function loadChat(){
  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    chatBox.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();
      let status=m.seen?"✔✔":"✔";

      chatBox.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
          <div class="small">${status}</div>
        </div>
      `;

      if(m.from!==me){
        db.collection("chats").doc(id)
        .collection("messages").doc(doc.id)
        .update({seen:true});
      }
    });
  });
}

/* STORIES */
function addStory(){
  let file=storyFile.files[0];
  let r=new FileReader();
  r.onload=()=>{
    db.collection("stories").add({
      user:me,
      media:r.result,
      type:file.type.startsWith("video")?"video":"image",
      time:Date.now(),
      views:[],
      reactions:[]
    });
  };
  r.readAsDataURL(file);
}

function loadStories(){
  db.collection("stories").orderBy("time","desc")
  .onSnapshot(snap=>{
    stories.innerHTML="";
    snap.forEach(doc=>{
      let s=doc.data();

      if(Date.now()-s.time<21600000){
        stories.innerHTML+=`
          <div class="story" onclick="openUserStory('${doc.id}')">
            <img src="${s.media}">
            <div style="font-size:12px">${s.user}</div>
          </div>
        `;
      }
    });
  });
}

/* STORY GRAND */
function openUserStory(id){
  db.collection("stories").doc(id).get().then(doc=>{
    let s=doc.data();

    let modal=document.createElement("div");
    modal.style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center";

    let media = s.type==="video"
      ? `<video src="${s.media}" controls autoplay style="width:100%;height:80%"></video>`
      : `<img src="${s.media}" style="width:100%;height:80%;object-fit:contain">`;

    modal.innerHTML=`
      <div style="color:white;position:absolute;top:10px;">${s.user}</div>
      ${media}
      <div>
        <button onclick="reactStory('${id}','🔥')">🔥</button>
        <button onclick="reactStory('${id}','❤️')">❤️</button>
        <button onclick="reactStory('${id}','😂')">😂</button>
      </div>
      <button onclick="this.parentElement.remove()">❌</button>
    `;

    document.body.appendChild(modal);
  });
}

/* REACTION */
function reactStory(id,emoji){
  db.collection("stories").doc(id).update({
    reactions:firebase.firestore.FieldValue.arrayUnion({
      user:me,
      emoji:emoji
    })
  });
}

/* TYPING */
function typing(){
  let id=[me,currentChatUser].sort().join("_");
  db.collection("typing").doc(id).set({user:me});
  setTimeout(()=>db.collection("typing").doc(id).delete(),1000);
}

db.collection("typing").onSnapshot(snap=>{
  snap.forEach(doc=>{
    let t=doc.data();
    if(t.user!==me){
      typing.innerText="✍️ écrit...";
    }
  });
});

/* ONLINE */
function presence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

</script>

</body>
  </html>
