<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Facebook Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, button, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#1877f2;
  color:white;
  border:none;
  font-weight:bold;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>📘 TechNova Social</header>

<div class="container">

<!-- USER -->
<div class="box">
  <input id="name" placeholder="Ton nom">
  <button onclick="setProfile()">Entrer</button>
</div>

<!-- POST -->
<div class="box">
  <h3>📢 Publication</h3>
  <textarea id="postText" placeholder="Quoi de neuf ?"></textarea>
  <button onclick="addPost()">Publier</button>
</div>

<!-- FEED -->
<div id="feed"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";

/* 👤 PROFIL */
function setProfile(){
  currentUser = document.getElementById("name").value;

  if(!currentUser){
    alert("Entre ton nom");
    return;
  }

  alert("Bienvenue " + currentUser);
}

/* ➕ POST */
function addPost(){
  const text = document.getElementById("postText").value;

  if(!text || !currentUser){
    alert("Entre ton nom et ton message");
    return;
  }

  db.collection("posts").add({
    text,
    user: currentUser,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
}

/* ❤️ LIKE */
function likePost(id, likes){
  db.collection("posts").doc(id).update({
    likes: likes + 1
  });
}

/* 💬 COMMENT */
function addComment(id){
  const input = document.getElementById("c-"+id);
  const text = input.value;

  if(!text) return;

  db.collection("comments").add({
    postId: id,
    text,
    user: currentUser,
    time: Date.now()
  });

  input.value = "";
}

/* 📡 FEED */
db.collection("posts").orderBy("time","desc")
.onSnapshot(snap=>{
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snap.forEach(doc=>{
    const p = doc.data();

    let html = `
      <div class="box">
        <strong>👤 ${p.user}</strong>
        <p>${p.text}</p>

        <button onclick="likePost('${doc.id}', ${p.likes||0})">
          ❤️ ${p.likes||0}
        </button>

        <div id="comments-${doc.id}"></div>

        <input id="c-${doc.id}" placeholder="Commenter...">
        <button onclick="addComment('${doc.id}')">Envoyer</button>
      </div>
    `;

    feed.innerHTML += html;

    loadComments(doc.id);
  });
});

/* 💬 LOAD COMMENTS */
function loadComments(postId){
  db.collection("comments")
  .where("postId","==",postId)
  .onSnapshot(snap=>{
    const div = document.getElementById("comments-"+postId);
    if(!div) return;

    div.innerHTML = "";

    snap.forEach(doc=>{
      const c = doc.data();

      div.innerHTML += `
        <div class="comment">
          <strong>${c.user}</strong> : ${c.text}
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
