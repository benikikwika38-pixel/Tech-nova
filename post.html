<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WhatsApp PRO MAX 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.box{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}

.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg{
  margin:5px;
  padding:6px;
  border-radius:8px;
}

.me{background:#d1e7ff; text-align:right;}
.other{background:#eee;}

.online{color:green;}
.offline{color:gray;}

.typing{
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<header>📘 WhatsApp PRO MAX 2 🔥</header>

<div class="nav">
  <button onclick="show('posts')">📢 Facebook</button>
  <button onclick="show('chat')">💬 WhatsApp</button>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none;">

  <!-- PROFILE -->
  <div class="box">
    <h3>Profil</h3>
    <input id="username" placeholder="Nom">
    <input id="bio" placeholder="Bio">
    <button onclick="saveProfile()">Sauvegarder</button>
    <div id="profile"></div>
  </div>

  <!-- POSTS FACEBOOK STYLE -->
  <div id="postsSection">

    <div class="box">
      <textarea id="postText" placeholder="Exprime-toi..."></textarea>
      <button onclick="addPost()">Publier</button>
    </div>

    <div id="feed"></div>
  </div>

  <!-- CHAT WHATSAPP STYLE -->
  <div id="chatSection" style="display:none;">

    <div class="box">
      <h3>💬 Chat global</h3>
      <div class="chatBox" id="chatBox"></div>
      <div id="typing" class="typing"></div>
    </div>

    <input id="msg" placeholder="Message...">
    <button onclick="sendMsg()">Envoyer</button>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";

/* ================= LOGIN ================= */
function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(u=>{
    me=u.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadPosts();
    loadChat();
    loadProfile();
  })
  .catch(e=>alert(e.message));
}

/* ================= PROFILE ================= */
function saveProfile(){
  db.collection("users").doc(me).set({
    name:document.getElementById("username").value,
    bio:document.getElementById("bio").value,
    lastSeen:Date.now()
  },{merge:true});
}

function loadProfile(){
  db.collection("users").doc(me).onSnapshot(d=>{
    if(!d.exists) return;
    const u=d.data();

    document.getElementById("profile").innerHTML=`
      <b>${u.name}</b>
      <p>${u.bio}</p>
    `;
  });
}

/* ================= POSTS FACEBOOK ================= */
function addPost(){
  db.collection("posts").add({
    text:document.getElementById("postText").value,
    user:me,
    likes:0,
    time:Date.now()
  });
}

function loadPosts(){
  db.collection("posts")
  .orderBy("time","desc")
  .onSnapshot(snap=>{

    let feed=document.getElementById("feed");
    feed.innerHTML="";

    snap.forEach(doc=>{
      let p=doc.data();

      feed.innerHTML+=`
        <div class="post">
          <b>${p.user}</b>
          <p>${p.text}</p>

          ❤️ ${p.likes}
          <button onclick="like('${doc.id}',${p.likes})">Like</button>

          <input id="c-${doc.id}" placeholder="comment">
          <button onclick="comment('${doc.id}')">Send</button>

          <div id="comments-${doc.id}"></div>
        </div>
      `;

      loadComments(doc.id);
    });

  });
}

function like(id,l){
  db.collection("posts").doc(id).update({
    likes:l+1
  });
}

function comment(id){
  let input=document.getElementById("c-"+id);

  db.collection("posts").doc(id)
  .collection("comments").add({
    text:input.value,
    user:me
  });

  input.value="";
}

function loadComments(id){
  db.collection("posts").doc(id)
  .collection("comments")
  .onSnapshot(s=>{
    let box=document.getElementById("comments-"+id);
    box.innerHTML="";
    s.forEach(d=>{
      box.innerHTML+=`<div class="comment"><b>${d.data().user}</b>: ${d.data().text}</div>`;
    });
  });
}

/* ================= CHAT WHATSAPP ================= */
function sendMsg(){
  let text=document.getElementById("msg").value;

  db.collection("chats").add({
    text,
    from:me,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

function loadChat(){
  db.collection("chats")
  .orderBy("time")
  .onSnapshot(snap=>{

    let box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();

      box.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          <b>${m.from}</b><br>${m.text}
        </div>
      `;
    });

  });
}

/* ================= NAV ================= */
function show(page){
  document.getElementById("postsSection").style.display=page==='posts'?'block':'none';
  document.getElementById("chatSection").style.display=page==='chat'?'block':'none';
}

</script>

</body>
  </html>
