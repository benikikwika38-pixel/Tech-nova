<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tech Réseau</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#18191a;color:white;}
header{background:#242526;padding:15px;text-align:center;}

.box{background:#242526;margin:10px;padding:10px;border-radius:10px;}

input{width:100%;padding:10px;border:none;border-radius:8px;}
button{padding:10px;border:none;border-radius:8px;background:#2374e1;color:white;margin-top:5px;}
</style>
</head>

<body>

<header>
🌐 Tech Réseau  
<br>
<button onclick="goChat()">💬 Nova Réseau</button>
</header>

<div class="box" id="loginBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none;">
  <div class="box">
    <h3>Bienvenue sur Tech Réseau</h3>
    <p>Accède à Nova Réseau pour discuter.</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let me="";

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;
    loginBox.style.display="none";
    app.style.display="block";
  })
  .catch(e=>alert(e.message));
}

function goChat(){
  if(!me){
    alert("Connecte-toi d'abord !");
    return;
  }

  localStorage.setItem("fromTech", "true");
  window.location.href="nova.html";
}
</script>

</body>
</html>
