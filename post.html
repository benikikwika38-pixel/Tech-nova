<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RS TECHNOVA ACADEMY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#e9edf1;}
header{background:#0a5bd3;color:white;padding:12px;text-align:center;font-weight:bold;}

.box{background:white;margin:10px;padding:10px;border-radius:12px;}

.chatBox{
  height:320px;
  overflow:auto;
  background:white;
  padding:10px;
  border-radius:12px;
}

.msg{padding:8px;margin:5px;border-radius:10px;max-width:70%;display:flex;gap:5px;}
.me{background:#cfe6ff;margin-left:auto;}
.other{background:#eee;}

.small{font-size:12px;color:gray;}

.avatar{
  width:30px;
  height:30px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>RS TECHNOVA ACADEMY🔥</header>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <br><br>
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- 🔥 PROFIL -->
  <div class="box">
    <h3>👤 Profil</h3>
    <input id="avatarInput" type="file">
    <button onclick="saveAvatar()">Changer photo</button>
    <div id="myAvatar"></div>
  </div>

  <div class="box">
    <h3>👥 Utilisateurs</h3>
    <div id="users"></div>
  </div>

  <div class="box">
    <h3>💬 Chat privé</h3>
    <div class="chatBox" id="chatBox"></div>
    <div id="typing" class="small"></div>
  </div>

  <input id="msg" placeholder="Message..." oninput="typing()">
  <button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let currentChatUser="";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadUsers();
    loadProfile();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* SIGNUP */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;

    db.collection("users").doc(me).set({
      email: me,
      avatar:"",
      lastSeen: Date.now()
    });

    alert("Compte créé");
  })
  .catch(e=>alert(e.message));
}

/* 🔥 PROFILE PHOTO */
function saveAvatar(){
  const file=document.getElementById("avatarInput").files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    db.collection("users").doc(me).set({
      avatar:reader.result
    },{merge:true});
  };
  reader.readAsDataURL(file);
}

function loadProfile(){
  db.collection("users").doc(me).onSnapshot(doc=>{
    if(!doc.exists) return;
    let u=doc.data();

    document.getElementById("myAvatar").innerHTML=`
      <img class="avatar" src="${u.avatar||''}">
    `;
  });
}

/* USERS LIST + 🟢 ONLINE */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(doc=>{
      let u=doc.data();
      let online = Date.now()-u.lastSeen < 5000;

      if(u.email !== me){
        box.innerHTML+=`
          <div onclick="openChat('${u.email}')">
            👤 ${u.email} ${online?"🟢":"⚫"}
          </div>
        `;
      }
    });
  });
}

/* OPEN CHAT */
function openChat(user){
  currentChatUser=user;
  loadChat();
}

/* SEND MESSAGE */
function sendMsg(){
  if(!currentChatUser) return alert("Choisis un utilisateur");

  let text=msg.value;
  if(!text) return;

  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id).collection("messages").add({
    text,
    from:me,
    time:Date.now(),
    seen:false
  });

  msg.value="";
}

/* LOAD CHAT + PHOTO */
function loadChat(){

  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(async snap=>{

    let box=document.getElementById("chatBox");
    box.innerHTML="";

    for(const docu of snap.docs){
      let m=docu.data();

      let userDoc=await db.collection("users").doc(m.from).get();
      let avatar=userDoc.data()?.avatar||"";

      let status=m.seen?"✔✔":"✔";

      box.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          <img class="avatar" src="${avatar}">
          <div>
            ${m.text}
            <div class="small">${status}</div>
          </div>
        </div>
      `;

      if(m.from!==me){
        db.collection("chats").doc(id)
        .collection("messages").doc(docu.id)
        .update({seen:true});
      }
    }
  });
}

/* 🔥 TYPING */
function typing(){
  let id=[me,currentChatUser].sort().join("_");

  db.collection("typing").doc(id).set({
    user:me
  });

  setTimeout(()=>{
    db.collection("typing").doc(id).delete();
  },1000);
}

db.collection("typing").onSnapshot(snap=>{
  snap.forEach(doc=>{
    let t=doc.data();
    if(t.user!==me){
      document.getElementById("typing").innerText="✍️ écrit...";
    }
  });
});

/* ONLINE */
function presence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

</script>

</body>
</html>
