<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WhatsApp ULTRA NEXT LEVEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#e9edf1;
}

header{
  background:#0a5bd3;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.box{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.chatBox{
  height:320px;
  overflow:auto;
  background:white;
  padding:10px;
  border-radius:12px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#cfe6ff;margin-left:auto;text-align:right;}
.other{background:#eee;}

.small{
  font-size:12px;
  color:gray;
}

.typing{
  font-size:12px;
  color:gray;
  height:20px;
}
</style>
</head>

<body>

<header>📱 WhatsApp ULTRA NEXT LEVEL 🔥</header>

<div class="nav">
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none;">

  <div class="box">
    <h3>💬 Chat global</h3>

    <div class="chatBox" id="chatBox"></div>

    <div id="typing" class="typing"></div>
  </div>

  <input id="msg" placeholder="Message..." oninput="typing()">
  <button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let typingTimeout;

/* ================= LOGIN ================= */
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  )
  .then(u=>{
    me=u.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadChat();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* ================= SEND MSG ================= */
function sendMsg(){

  const text=document.getElementById("msg").value;
  if(!text) return;

  db.collection("chats").add({
    text,
    from:me,
    time:Date.now(),
    seen:false
  });

  document.getElementById("msg").value="";
}

/* ================= CHAT REAL TIME ================= */
function loadChat(){
  db.collection("chats")
  .orderBy("time")
  .onSnapshot(snap=>{

    let box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();

      let status = m.seen ? "✔✔ vu" : "✔ envoyé";

      box.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          <b>${m.from}</b><br>
          ${m.text}
          <div class="small">${status}</div>
        </div>
      `;

      // mark as seen
      if(m.from !== me){
        db.collection("chats").doc(doc.id).update({
          seen:true
        });
      }

    });

  });
}

/* ================= TYPING ================= */
function typing(){

  db.collection("typing").doc("global").set({
    user:me,
    time:Date.now()
  });

  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>{
    db.collection("typing").doc("global").delete();
  },1000);
}

/* show typing */
db.collection("typing").doc("global")
.onSnapshot(doc=>{
  let t=document.getElementById("typing");

  if(doc.exists){
    t.innerText = "⌨️ " + doc.data().user + " écrit...";
  } else {
    t.innerText = "";
  }
});

/* ================= PRESENCE ONLINE ================= */
function presence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

/* NAV */
function show(){
  document.getElementById("chatSection").style.display="block";
}

</script>

</body>
  </html>
