<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Social</title>

<style>
body { font-family: Arial; background:#f0f2f5; }

.box {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}

input, button, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
}

.post {
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment {
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}

.admin {
  background:#111;
  color:white;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="box" id="auth">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>

  <h4>Créer compte</h4>
  <input id="name" placeholder="Nom">
  <button onclick="register()">S'inscrire</button>

  <h4>Admin</h4>
  <input id="adminPass" placeholder="Mot admin">
  <button onclick="adminLogin()">Entrer Admin</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="box">
  <h3 id="profileName"></h3>
  <textarea id="postText" placeholder="Quoi de neuf ?"></textarea>
  <button onclick="addPost()">Publier</button>
</div>

<div id="feed"></div>

</div>

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" class="box admin" style="display:none;">
  <h3>👨‍💻 DASHBOARD ADMIN</h3>

  <h4>👥 Utilisateurs</h4>
  <div id="users"></div>

  <h4>📢 Posts</h4>
  <div id="adminPosts"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let isAdmin = false;

// 🔐 INSCRIPTION
function register(){
  const email = emailEl.value;
  const pass = passwordEl.value;
  const name = nameEl.value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(user=>{
    db.collection("users").doc(user.user.uid).set({
      name,
      email
    });
  });
}

// 🔐 LOGIN USER
function login(){
  auth.signInWithEmailAndPassword(emailEl.value, passwordEl.value);
}

// 🔐 ADMIN LOGIN
function adminLogin(){
  const pass = document.getElementById("adminPass").value;

  if(pass === "ADMIN123"){
    isAdmin = true;
    alert("Mode admin activé");

    document.getElementById("adminPanel").style.display = "block";
    loadUsers();
    loadAdminPosts();
  } else {
    alert("Mot incorrect");
  }
}

// 🔁 SESSION
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user.uid;

    db.collection("users").doc(user.uid).get()
    .then(doc=>{
      profileName.innerText = doc.data().name;
    });

    auth.style.display = "none";
    app.style.display = "block";

    loadPosts();
  }
});

// ➕ POST
function addPost(){
  db.collection("posts").add({
    text: postText.value,
    userId: currentUser,
    time: Date.now()
  });
}

// 📡 POSTS
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    feed.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      db.collection("users").doc(p.userId).get()
      .then(u=>{
        feed.innerHTML += `
          <div class="post">
            <strong>${u.data().name}</strong>
            <p>${p.text}</p>
          </div>
        `;
      });
    });
  });
}

// 👨‍💻 USERS ADMIN
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    users.innerHTML = "";
    snap.forEach(doc=>{
      users.innerHTML += `<p>${doc.data().name}</p>`;
    });
  });
}

// 👨‍💻 POSTS ADMIN
function loadAdminPosts(){
  db.collection("posts").onSnapshot(snap=>{
    adminPosts.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      adminPosts.innerHTML += `
        <div>
          ${p.text}
          <button onclick="deletePost('${doc.id}')">❌</button>
        </div>
      `;
    });
  });
}

// ❌ DELETE POST
function deletePost(id){
  db.collection("posts").doc(id).delete();
}

</script>

</body>
</html>
