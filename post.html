<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Facebook</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  max-width:650px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

input, button, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
}

button{
  background:#1877f2;
  color:white;
  border:none;
  cursor:pointer;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
  font-size:14px;
}

.admin{
  background:#fff3cd;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>📘 TechNova réseau(Mode Sécurisé)</header>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion étudiant</h3>
  <input id="name" placeholder="Nom">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- POST -->
<div class="box">
  <h3>📢 Publier (en attente de validation)</h3>
  <textarea id="postText"></textarea>
  <button onclick="addPost()">Envoyer</button>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- ADMIN -->
<div class="admin" id="adminPanel" style="display:none;">
  <h3>🛡️ Admin - Validation des posts</h3>
  <div id="pending"></div>
</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "TA_KEY",
  authDomain: "TON_DOMAIN",
  projectId: "TON_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";

/* 🔐 ADMIN PASSWORD */
const ADMIN_PASS = "Admin@2026";

/* LOGIN */
function login(){

  const name = document.getElementById("name").value;
  const pass = document.getElementById("password").value;

  if(!name){
    alert("Entre ton nom");
    return;
  }

  currentUser = name;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadApprovedPosts();

  if(pass === ADMIN_PASS){
    document.getElementById("adminPanel").style.display = "block";
    loadPendingPosts();
  }
}

/* ➕ POST (EN ATTENTE) */
function addPost(){

  const text = document.getElementById("postText").value;
  if(!text) return;

  db.collection("posts").add({
    text,
    user: currentUser,
    status: "pending",
    time: Date.now()
  });

  alert("Post envoyé pour validation ⏳");
  document.getElementById("postText").value = "";
}

/* 📡 POSTS VALIDÉS */
function loadApprovedPosts(){

  db.collection("posts")
  .where("status","==","approved")
  .orderBy("time","desc")
  .onSnapshot(snap=>{

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      feed.innerHTML += `
        <div class="post">

          <strong>${p.user}</strong>
          <p>${p.text}</p>

          <!-- COMMENTAIRES -->
          <input id="c-${doc.id}" placeholder="Commentaire">
          <button onclick="addComment('${doc.id}')">Commenter</button>

          <div id="comments-${doc.id}"></div>

        </div>
      `;

      loadComments(doc.id);
    });

  });
}

/* 🛡️ POSTS EN ATTENTE (ADMIN) */
function loadPendingPosts(){

  db.collection("posts")
  .where("status","==","pending")
  .onSnapshot(snap=>{

    const box = document.getElementById("pending");
    box.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      box.innerHTML += `
        <div class="post">

          <strong>${p.user}</strong>
          <p>${p.text}</p>

          <button onclick="approve('${doc.id}')">✔ Valider</button>
          <button onclick="reject('${doc.id}')">❌ Refuser</button>

        </div>
      `;
    });

  });
}

/* ✔ APPROUVER */
function approve(id){
  db.collection("posts").doc(id).update({
    status: "approved"
  });
}

/* ❌ REFUSER */
function reject(id){
  db.collection("posts").doc(id).delete();
}

/* 💬 COMMENTAIRE */
function addComment(postId){

  const input = document.getElementById("c-" + postId);
  const text = input.value;

  if(!text) return;

  db.collection("posts")
  .doc(postId)
  .collection("comments")
  .add({
    text,
    user: currentUser,
    time: Date.now()
  });

  input.value = "";
}

/* 📡 LOAD COMMENTS */
function loadComments(postId){

  db.collection("posts")
  .doc(postId)
  .collection("comments")
  .orderBy("time","asc")
  .onSnapshot(snap=>{

    const box = document.getElementById("comments-" + postId);
    if(!box) return;

    box.innerHTML = "";

    snap.forEach(doc=>{
      const c = doc.data();

      box.innerHTML += `
        <div class="comment">
          <strong>${c.user}</strong>: ${c.text}
        </div>
      `;
    });

  });
}

</script>

</body>
</html>
