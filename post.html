<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Social</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, button, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#1877f2;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post img{
  width:100%;
  margin-top:8px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>📘 TechNova Social</header>

<div class="container">

<!-- 🔐 LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Entrer dans le réseau</h3>
  <input id="name" placeholder="Ton nom">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="box">
  <h3>📢 Publication</h3>
  <textarea id="postText" placeholder="Quoi de neuf ?"></textarea>
  
  <input type="file" id="image">

  <button onclick="addPost()">Publier</button>
</div>

<div id="feed"></div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = "";

/* 🔐 MOT DE PASSE FIXE */
const APP_PASSWORD = "Nova@2026";

/* LOGIN */
function login(){
  const name = document.getElementById("name").value;
  const pass = document.getElementById("password").value;

  if(pass !== APP_PASSWORD){
    alert("Mot de passe incorrect ❌");
    return;
  }

  if(!name){
    alert("Entre ton nom");
    return;
  }

  currentUser = name;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadPosts();
}

/* 📸 IMAGE -> BASE64 */
function toBase64(file, callback){
  const reader = new FileReader();
  reader.onload = () => callback(reader.result);
  reader.readAsDataURL(file);
}

/* ➕ POST */
function addPost(){
  const text = document.getElementById("postText").value;
  const file = document.getElementById("image").files[0];

  if(!text){
    alert("Écris quelque chose");
    return;
  }

  if(file){
    toBase64(file, (img)=>{
      savePost(text, img);
    });
  }else{
    savePost(text, "");
  }
}

function savePost(text, image){
  db.collection("posts").add({
    text,
    image,
    user: currentUser,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
}

/* ❤️ LIKE */
function likePost(id, likes){
  db.collection("posts").doc(id).update({
    likes: likes + 1
  });
}

/* 📡 LOAD POSTS */
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      feed.innerHTML += `
        <div class="box">
          <strong>👤 ${p.user}</strong>
          <p>${p.text}</p>

          ${p.image ? `<img src="${p.image}">` : ""}

          <button onclick="likePost('${doc.id}', ${p.likes||0})">
            ❤️ ${p.likes||0}
          </button>
        </div>
      `;
    });
  });
}

</script>

</body>
  </html>
