<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
  font-size:13px;
}

.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

img.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion TechNova</h3>
  <input id="name" placeholder="Email ou admin">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none;">

<!-- 👤 PROFIL -->
<div class="box">
  <h3>👤 Profil utilisateur</h3>

  <input id="username" placeholder="Nom affiché">
  <input id="bio" placeholder="Bio">
  <input type="file" id="avatar">

  <button onclick="saveProfile()">💾 Sauvegarder profil</button>

  <div id="myProfile"></div>
</div>

<!-- POSTS -->
<div id="postsSection">
  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <button onclick="addPost()">📤 Publier</button>
  </div>

  <div id="feed"></div>
</div>

</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me = "";

/* ================= LOGIN ================= */
function login(){

  const email = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(user=>{

    me = user.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadProfile();
    startPresence();

  })
  .catch(err=>alert(err.message));
}

/* ================= PROFIL SAVE FIX ================= */
function saveProfile(){

  const name = document.getElementById("username").value;
  const bio = document.getElementById("bio").value;
  const file = document.getElementById("avatar").files[0];

  const save = (img="")=>{

    db.collection("users").doc(me).set({
      name,
      bio,
      avatar: img,
      email: me,
      lastSeen: Date.now()
    }, { merge: true })   // ✅ IMPORTANT FIX

    .then(()=> loadProfile())
    .catch(err=>alert(err.message));
  };

  if(file){
    const reader = new FileReader();
    reader.onload = ()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save();
}

/* ================= LOAD PROFILE FIX ================= */
function loadProfile(){

  db.collection("users").doc(me)
  .onSnapshot(doc=>{

    if(!doc.exists) return;

    const u = doc.data();

    document.getElementById("myProfile").innerHTML = `
      <div class="post">
        <img class="avatar" src="${u.avatar || ''}">
        <b>${u.name || me}</b>
        <p>${u.bio || ''}</p>
      </div>
    `;
  });
}

/* ================= PRESENCE FIX (IMPORTANT) ================= */
function startPresence(){

  setInterval(()=>{

    if(me){
      db.collection("users").doc(me).set({
        lastSeen: Date.now()
      }, { merge: true })   // ✅ ne détruit plus bio/avatar
      .catch(()=>{});
    }

  },3000);
}

/* ================= POSTS ================= */
function addPost(){

  const text = document.getElementById("postText").value;

  db.collection("posts").add({
    text,
    user: me,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("postText").value="";
}

function show(page){
  document.getElementById("postsSection").style.display = page==='posts'?'block':'none';
}

</script>

</body>
</html>
