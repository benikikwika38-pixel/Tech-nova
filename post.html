<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RS TECHNOVA ACADEMY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#e9edf1;}
header{background:#0a5bd3;color:white;padding:12px;text-align:center;font-weight:bold;}

.box{background:white;margin:10px;padding:10px;border-radius:12px;}

.chatBox{height:320px;overflow:auto;background:white;padding:10px;border-radius:12px;}

.msg{padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.me{background:#cfe6ff;margin-left:auto;}
.other{background:#eee;}

.small{font-size:12px;color:gray;}
.avatar{width:30px;height:30px;border-radius:50%;}
</style>
</head>

<body>

<header>RS TECHNOVA ACADEMY🔥</header>

<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <br><br>
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<div id="app" style="display:none;">

<div class="box">
  <h3>👤 Profil</h3>
  <input id="avatarInput" type="file">
  <button onclick="saveAvatar()">Changer photo</button>
  <div id="myAvatar"></div>
</div>

<!-- STORIES -->
<div class="box">
  <h3>📸 Stories</h3>
  <input type="file" id="storyFile">
  <button onclick="addStory()">Publier</button>
  <div id="stories"></div>
</div>

<div class="box">
  <h3>👥 Utilisateurs</h3>
  <div id="users"></div>
</div>

<div class="box">
  <h3>💬 Chat privé</h3>
  <div class="chatBox" id="chatBox"></div>
  <div id="typing" class="small"></div>
</div>

<input id="msg" placeholder="Message..." oninput="typing()">
<button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let currentChatUser="";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;
    loginBox.style.display="none";
    app.style.display="block";
    loadUsers();
    loadProfile();
    loadStories();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* SIGNUP */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;
    db.collection("users").doc(me).set({
      email:me,avatar:"",lastSeen:Date.now()
    });
    alert("Compte créé");
  })
  .catch(e=>alert(e.message));
}

/* PROFILE */
function saveAvatar(){
  let file=avatarInput.files[0];
  if(!file)return;
  let r=new FileReader();
  r.onload=()=>{
    db.collection("users").doc(me).set({avatar:r.result},{merge:true});
  };
  r.readAsDataURL(file);
}

function loadProfile(){
  db.collection("users").doc(me).onSnapshot(doc=>{
    let u=doc.data();
    myAvatar.innerHTML=`<img class="avatar" src="${u.avatar||''}">`;
  });
}

/* USERS */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    users.innerHTML="";
    snap.forEach(doc=>{
      let u=doc.data();
      let online=Date.now()-u.lastSeen<5000;
      if(u.email!==me){
        users.innerHTML+=`
          <div onclick="openChat('${u.email}')">
            👤 ${u.email} ${online?"🟢":"⚫"}
          </div>`;
      }
    });
  });
}

/* CHAT */
function openChat(user){
  currentChatUser=user;
  loadChat();
}

function sendMsg(){
  if(!currentChatUser)return alert("Choisis un utilisateur");
  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id).collection("messages").add({
    text:msg.value,
    from:me,
    time:Date.now(),
    seen:false
  });

  msg.value="";
}

/* 🔥 FAST CHAT */
function loadChat(){
  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    chatBox.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();
      let status=m.seen?"✔✔":"✔";

      chatBox.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
          <div class="small">${status}</div>
          ${m.from===me?`<button onclick="deleteMsg('${id}','${doc.id}')">🗑</button>`:""}
        </div>
      `;

      if(m.from!==me){
        db.collection("chats").doc(id)
        .collection("messages").doc(doc.id)
        .update({seen:true});
      }
    });
  });
}

function deleteMsg(chatId,msgId){
  db.collection("chats").doc(chatId)
  .collection("messages").doc(msgId)
  .delete();
}

/* STORIES */
function addStory(){
  let file=storyFile.files[0];
  if(!file)return;

  let r=new FileReader();
  r.onload=()=>{
    db.collection("stories").add({
      user:me,
      media:r.result,
      type:file.type.startsWith("video")?"video":"image",
      time:Date.now(),
      views:[],
      reactions:{}
    });
  };
  r.readAsDataURL(file);
}

function loadStories(){
  db.collection("stories").orderBy("time","desc")
  .onSnapshot(snap=>{
    stories.innerHTML="";

    snap.forEach(doc=>{
      let s=doc.data();

      if(Date.now()-s.time<21600000){
        stories.innerHTML+=`
          <div onclick="openStory('${doc.id}')">
            👤 ${s.user} (${s.views?.length||0} vues)
          </div>
        `;
      }
    });
  });
}

function openStory(id){
  db.collection("stories").doc(id).get().then(doc=>{
    let s=doc.data();

    db.collection("stories").doc(id).update({
      views:firebase.firestore.FieldValue.arrayUnion(me)
    });

    if(s.type==="video"){
      chatBox.innerHTML=`<video src="${s.media}" controls autoplay width="100%"></video>`;
    }else{
      chatBox.innerHTML=`<img src="${s.media}" style="width:100%">`;
    }
  });
}

function reactStory(id,emoji){
  db.collection("stories").doc(id).update({
    ["reactions."+me]:emoji
  });
}

function deleteStory(id){
  db.collection("stories").doc(id).delete();
}

/* TYPING */
function typing(){
  let id=[me,currentChatUser].sort().join("_");
  db.collection("typing").doc(id).set({user:me});
  setTimeout(()=>db.collection("typing").doc(id).delete(),1000);
}

db.collection("typing").onSnapshot(snap=>{
  snap.forEach(doc=>{
    let t=doc.data();
    if(t.user!==me){
      typing.innerText="✍️ écrit...";
    }
  });
});

/* ONLINE */
function presence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

</script>
</body>
</html>
