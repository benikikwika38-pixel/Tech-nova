<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.chatBox{
  height:250px;
  overflow:auto;
  background:white;
  padding:10px;
}

img.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
}

.userItem{
  cursor:pointer;
  padding:5px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion</h3>
  <input id="name" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- PROFIL -->
<div class="box">
  <h3>👤 Profil</h3>
  <input id="username" placeholder="Nom">
  <input id="bio" placeholder="Bio">
  <input type="file" id="avatar">
  <button onclick="saveProfile()">💾 Sauvegarder</button>
  <div id="myProfile"></div>
</div>

<!-- POSTS -->
<div id="postsSection">
  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <input type="file" id="postImage">
    <button onclick="addPost()">📤 Publier</button>
  </div>
  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

  <div class="box">
    <h3>👥 Utilisateurs</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me = "";
let selectedUser = "";

/* LOGIN */
function login(){
  const email = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
  .then(user=>{
    me = user.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadPosts();
    loadUsers();
    loadProfile();
    startPresence();
  })
  .catch(err=>alert(err.message));
}

/* SIGNUP */
function signup(){
  const email=document.getElementById("name").value;
  const password=document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,password)
  .catch(err=>alert(err.message));
}

/* PROFILE */
function saveProfile(){

  const name=document.getElementById("username").value;
  const bio=document.getElementById("bio").value;
  const file=document.getElementById("avatar").files[0];

  const ref=db.collection("users").doc(me);

  ref.get().then(doc=>{

    const old=doc.exists?doc.data():{};

    const save=(img=old.avatar||"")=>{
      ref.set({
        name:name||old.name||me,
        bio:bio||old.bio||"",
        avatar:img,
        lastSeen:Date.now()
      },{merge:true});
    };

    if(file){
      const reader=new FileReader();
      reader.onload=()=>save(reader.result);
      reader.readAsDataURL(file);
    } else save();
  });
}

/* LOAD PROFILE */
function loadProfile(){
  db.collection("users").doc(me).onSnapshot(doc=>{
    if(!doc.exists) return;
    const u=doc.data();

    document.getElementById("myProfile").innerHTML=`
      <div class="post">
        <img class="avatar" src="${u.avatar||''}">
        <b>${u.name}</b>
        <p>${u.bio}</p>
      </div>
    `;
  });
}

/* POSTS */
function addPost(){
  const text=document.getElementById("postText").value;
  const file=document.getElementById("postImage").files[0];

  const save=(img="")=>{
    db.collection("posts").add({
      text,
      image:img,
      user:me,
      likes:0,
      time:Date.now()
    });
  };

  if(file){
    const reader=new FileReader();
    reader.onload=()=>save(reader.result);
    reader.readAsDataURL(file);
  } else save("");
}

function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    const feed=document.getElementById("feed");
    feed.innerHTML="";
    snap.forEach(doc=>{
      const p=doc.data();
      feed.innerHTML+=`
        <div class="post">
          <b>${p.user}</b>
          <p>${p.text}</p>
          ${p.image?`<img src="${p.image}" style="width:100%">`:""}
        </div>
      `;
    });
  });
}

/* USERS + ONLINE + CLICK CHAT */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    const box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(d=>{
      const u=d.data();
      const online=Date.now()-u.lastSeen<5000;

      box.innerHTML+=`
        <div class="userItem" onclick="openChat('${d.id}')">
          <img class="avatar" src="${u.avatar||''}">
          ${u.name||d.id} ${online?"🟢":"⚫"}
        </div>
      `;
    });
  });
}

/* CHAT 1v1 */
function openChat(user){
  selectedUser=user;
  loadChat();
}

function loadChat(){

  if(!selectedUser) return;

  db.collection("chats")
  .orderBy("time")
  .onSnapshot(snap=>{

    const box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(d=>{
      const m=d.data();

      const isMine = m.from===me && m.to===selectedUser;
      const isOther = m.from===selectedUser && m.to===me;

      if(isMine || isOther){
        box.innerHTML+=`
          <div class="post">
            <b>${m.from}</b>: ${m.text}
          </div>
        `;
      }
    });

  });
}

function sendMsg(){
  const text=document.getElementById("msg").value;
  if(!text || !selectedUser) return;

  db.collection("chats").add({
    text,
    from:me,
    to:selectedUser,
    time:Date.now()
  });

  document.getElementById("msg").value="";
}

/* ONLINE STATUS */
function startPresence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

/* NAV */
function show(page){
  document.getElementById("postsSection").style.display=page==='posts'?'block':'none';
  document.getElementById("chatSection").style.display=page==='chat'?'block':'none';
}

</script>

</body>
  </html>
