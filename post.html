<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova SOCIAL ULTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef0f3;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

/* CHAT STYLE WHATSAPP */
.chatBox{
  height:300px;
  overflow:auto;
  background:#e5ddd5;
  padding:10px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#dcf8c6;margin-left:auto;}
.other{background:white;}

.typing{
  font-size:12px;
  color:gray;
  margin-left:5px;
}

.online{
  color:green;
}
</style>
</head>

<body>

<header>📘 TechNova SOCIAL ULTRA</header>

<div class="nav">
<button onclick="show('posts')">Posts</button>
<button onclick="show('chat')">Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Connexion</h3>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- USERS -->
<div class="box">
<h3>Utilisateurs</h3>
<div id="users"></div>
</div>

<!-- POSTS -->
<div id="postsSection">
<div class="box">
<textarea id="postText"></textarea>
<button onclick="addPost()">Publier</button>
</div>
<div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

<h3 id="chatWith">Chat</h3>

<div class="chatBox" id="chatBox"></div>

<div id="typing"></div>

<input id="msg" oninput="typing()" placeholder="Message...">
<button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
authDomain:"technova-academy.firebaseapp.com",
projectId:"technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let selectedUser="";

/* LOGIN */
function login(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.then(u=>{
me=u.user.email;

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

loadUsers();
loadPosts();
listenChat();
setOnline();
});
}

/* ONLINE */
function setOnline(){
setInterval(()=>{
db.collection("users").doc(me).set({
lastSeen:Date.now()
},{merge:true});
},5000);
}

/* POSTS */
function addPost(){
db.collection("posts").add({
text:document.getElementById("postText").value,
user:me,
time:Date.now()
});
}

function loadPosts(){
db.collection("posts").orderBy("time","desc")
.onSnapshot(snap=>{
const feed=document.getElementById("feed");
feed.innerHTML="";
snap.forEach(d=>{
feed.innerHTML+=`
<div class="post">
<b>${d.data().user}</b>
<p>${d.data().text}</p>
</div>`;
});
});
}

/* USERS */
function loadUsers(){
db.collection("users").onSnapshot(snap=>{
const box=document.getElementById("users");
box.innerHTML="";

snap.forEach(d=>{
const u=d.data();
const online=Date.now()-u.lastSeen<5000;

box.innerHTML+=`
<div onclick="openChat('${d.id}')">
${d.id} <span class="${online?'online':''}">
${online?'🟢':'⚫'}
</span>
</div>`;
});
});
}

/* CHAT ID */
function chatId(u1,u2){
return [u1,u2].sort().join("_");
}

/* OPEN CHAT */
function openChat(user){
selectedUser=user;
document.getElementById("chatWith").innerText="Chat avec "+user;
listenChat();
markSeen();
}

/* SEND MSG */
function sendMsg(){
const text=document.getElementById("msg").value;
if(!text) return;

const id=chatId(me,selectedUser);

db.collection("chats").doc(id)
.collection("msgs").add({
text,
from:me,
time:Date.now(),
seen:false
});

document.getElementById("msg").value="";
}

/* CHAT REAL TIME */
function listenChat(){
if(!selectedUser) return;

const id=chatId(me,selectedUser);

db.collection("chats").doc(id)
.collection("msgs")
.orderBy("time")
.onSnapshot(snap=>{
const box=document.getElementById("chatBox");
box.innerHTML="";

snap.forEach(d=>{
const m=d.data();
const isMe=m.from===me;

box.innerHTML+=`
<div class="${isMe?'msg me':'msg other'}">
${m.text}
</div>`;
});

box.scrollTop=box.scrollHeight;
});
}

/* TYPING */
let typingTimeout;

function typing(){
const id=chatId(me,selectedUser);
db.collection("chats").doc(id).set({
typing:me
},{merge:true});

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{
db.collection("chats").doc(id).update({
typing:""
});
},1500);
}

/* SHOW TYPING */
db.collection("chats").onSnapshot(()=>{
if(!selectedUser) return;

const id=chatId(me,selectedUser);

db.collection("chats").doc(id)
.onSnapshot(doc=>{
const data=doc.data();
document.getElementById("typing").innerHTML =
data?.typing ? "🟦 en train d'écrire..." : "";
});
});

/* NAV */
function show(p){
document.getElementById("postsSection").style.display=p==='posts'?'block':'none';
document.getElementById("chatSection").style.display=p==='chat'?'block':'none';
}

</script>

</body>
</html>
