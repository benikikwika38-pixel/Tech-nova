<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RS TECHNOVA ACADEMY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#e9edf1;}
header{background:#0a5bd3;color:white;padding:12px;text-align:center;font-weight:bold;}

.box{background:white;margin:10px;padding:10px;border-radius:12px;}

.chatBox{
  height:320px;
  overflow:auto;
  background:white;
  padding:10px;
  border-radius:12px;
}

.msg{padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.me{background:#cfe6ff;margin-left:auto;}
.other{background:#eee;}

.small{font-size:12px;color:gray;}

.avatar{
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
}
.storyAvatar{
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid green;
  cursor:pointer;
}
</style>
</head>

<body>

<header>RS TECHNOVA ACADEMY🔥</header>

<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <br><br>
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<div id="app" style="display:none;">

<div class="box">
  <h3>👤 Profil</h3>
  <input id="avatarInput" type="file">
  <button onclick="saveAvatar()">Changer photo</button>
  <div id="myAvatar"></div>
</div>

<div class="box">
  <h3>📸 Stories</h3>
  <input type="file" id="storyInput">
  <button onclick="addStory()">Publier</button>
  <div id="stories"></div>
</div>

<div class="box">
  <h3>👥 Utilisateurs</h3>
  <div id="users"></div>
</div>

<div class="box">
  <h3>💬 Chat privé</h3>
  <div class="chatBox" id="chatBox"></div>
  <div id="typing" class="small"></div>
</div>

<input id="msg" placeholder="Message..." oninput="typing()">
<button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let currentChatUser="";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadUsers();
    loadProfile();
    loadStories();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* SIGNUP */
function signup(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(u=>{
    me=u.user.email;

    db.collection("users").doc(me).set({
      email: me || "User",
      avatar:"",
      lastSeen: Date.now()
    });

    alert("Compte créé");
  })
  .catch(e=>alert(e.message));
}

/* PROFILE */
function saveAvatar(){
  const file=avatarInput.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    db.collection("users").doc(me).set({
      avatar:reader.result
    },{merge:true});
  };
  reader.readAsDataURL(file);
}

function loadProfile(){
  db.collection("users").doc(me).onSnapshot(doc=>{
    let u=doc.data();
    myAvatar.innerHTML=`<img class="avatar" src="${u.avatar||''}">`;
  });
}

/* USERS */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    users.innerHTML="";
    snap.forEach(doc=>{
      let u=doc.data();
      let online = Date.now() - (u.lastSeen || 0) < 5000;

      if(u.email !== me){
        users.innerHTML+=`
          <div onclick="openChat('${u.email}')">
            👤 ${u.email} ${online?"🟢":""}
          </div>
        `;
      }
    });
  });
}

/* CHAT */
function openChat(user){
  currentChatUser=user;
  loadChat();
}

function sendMsg(){
  if(!currentChatUser) return alert("Choisis un utilisateur");

  let text=msg.value;
  if(!text) return;

  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id).collection("messages").add({
    text,
    from:me,
    time:Date.now(),
    seen:false
  });

  msg.value="";
}

function loadChat(){
  let id=[me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    chatBox.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();
      let status=m.seen?"✔✔":"✔";

      chatBox.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
          <div class="small">${status}</div>

          ${m.from===me?`
          <button onclick="deleteMsg('${doc.id}','${id}')" style="background:red;">🗑</button>
          `:""}
        </div>
      `;

      if(m.from!==me){
        db.collection("chats").doc(id)
        .collection("messages").doc(doc.id)
        .update({seen:true});
      }
    });
  });
}

function deleteMsg(msgId,chatId){
  db.collection("chats").doc(chatId)
  .collection("messages").doc(msgId).delete();
}

/* TYPING */
function typing(){
  let id=[me,currentChatUser].sort().join("_");

  db.collection("typing").doc(id).set({user:me});

  setTimeout(()=>{
    db.collection("typing").doc(id).delete();
  },1000);
}

db.collection("typing").onSnapshot(snap=>{
  snap.forEach(doc=>{
    let t=doc.data();
    if(t.user!==me){
      typing.innerText="✍️ écrit...";
    }
  });
});

/* ONLINE */
function presence(){
  setInterval(()=>{
    db.collection("users").doc(me).set({
      lastSeen:Date.now()
    },{merge:true});
  },3000);
}

/* STORIES */
function addStory(){
  const file=storyInput.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=()=>{
    let type=file.type.includes("video")?"video":"image";

    db.collection("stories").add({
      user:me,
      media:reader.result,
      type:type,
      time:Date.now(),
      views:[]
    });
  };
  reader.readAsDataURL(file);
}

function loadStories(){
  db.collection("stories").onSnapshot(snap=>{
    stories.innerHTML="";
    snap.forEach(doc=>{
      let s=doc.data();

      stories.innerHTML+=`
        <img class="storyAvatar" src="${s.media}" onclick="openUserStory('${s.user}')">
      `;
    });
  });
}

/* STORY FULL SCREEN */
function openUserStory(user){
  db.collection("stories")
  .where("user","==",user)
  .orderBy("time","desc")
  .limit(1)
  .get()
  .then(snap=>{
    let doc=snap.docs[0];
    let s=doc.data();

    let modal=document.createElement("div");
    modal.style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999";

    modal.innerHTML=`
      <div style="color:white;padding:10px;">${user}</div>

      ${s.type==="video"
        ? `<video src="${s.media}" controls autoplay style="width:100%;height:80%"></video>`
        : `<img src="${s.media}" style="width:100%;height:80%">`
      }

      <button onclick="deleteStory('${doc.id}')">🗑 Supprimer</button>
      <button onclick="this.parentElement.remove()">❌</button>
    `;

    document.body.appendChild(modal);
  });
}

function deleteStory(id){
  db.collection("stories").doc(id).delete();
  alert("Story supprimée");
}

</script>

</body>
  </html>
