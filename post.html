<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova WhatsApp PRO MAX 🔥</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f0f2f5;}
header{background:#128C7E;color:white;padding:10px;text-align:center;font-weight:bold;}
.container{max-width:700px;margin:auto;padding:10px;}

.box{background:white;padding:10px;margin-top:10px;border-radius:10px;}

.user{display:flex;align-items:center;justify-content:space-between;
padding:8px;border-bottom:1px solid #ddd;cursor:pointer;}

.chatBox{height:350px;overflow:auto;background:white;padding:10px;border-radius:10px;}

.msg{padding:8px;margin:5px;border-radius:8px;max-width:70%;}
.me{background:#dcf8c6;margin-left:auto;text-align:right;}
.other{background:#eee;}

.small{font-size:12px;color:gray;}
.online{color:green;font-weight:bold;}
.offline{color:gray;}
</style>
</head>

<body>

<header>💬 WhatsApp PRO MAX - TechNova 🔥</header>

<div class="container">

<!-- USERS -->
<div class="box">
  <h3>👥 Étudiants</h3>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div class="box">
  <h3 id="chatTitle">Choisis un utilisateur</h3>
  <div class="chatBox" id="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me = "USER_" + Math.random().toString(36).substr(2,5);
let selectedUser = null;

/* ========== USERS ========== */
function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    const box = document.getElementById("users");
    box.innerHTML = "";

    snap.forEach(doc=>{
      const u = doc.data();
      const id = doc.id;

      const online = u.lastSeen && (Date.now() - u.lastSeen < 5000);

      box.innerHTML += `
        <div class="user" onclick="openChat('${id}')">
          <div>
            👤 ${u.name || id}
          </div>
          <div class="${online?'online':'offline'}">
            ${online?'🟢':'⚫'}
          </div>
        </div>
      `;
    });

  });
}

/* ========== OPEN CHAT ========== */
function openChat(userId){
  selectedUser = userId;
  document.getElementById("chatTitle").innerText = "Chat avec " + userId;
  loadMessages();
}

/* ========== SEND MSG ========== */
function sendMsg(){

  const text = document.getElementById("msg").value;
  if(!text || !selectedUser) return;

  db.collection("messages").add({
    from: me,
    to: selectedUser,
    text,
    time: Date.now(),
    seen: false
  });

  document.getElementById("msg").value="";
}

/* ========== LOAD CHAT ========== */
function loadMessages(){

  db.collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{

    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    snap.forEach(doc=>{
      const m = doc.data();

      const isMine =
        (m.from === me && m.to === selectedUser) ||
        (m.from === selectedUser && m.to === me);

      if(!isMine) return;

      box.innerHTML += `
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
          <div class="small">
            ${m.from===me ? (m.seen ? "✔✔ vu" : "✔ envoyé") : ""}
          </div>
        </div>
      `;
    });

    box.scrollTop = box.scrollHeight;

  });
}

/* ========== PRESENCE + SEEN ========== */
setInterval(()=>{

  // update online
  db.collection("users").doc(me).set({
    name: me,
    lastSeen: Date.now()
  }, {merge:true});

  // mark seen messages
  if(selectedUser){
    db.collection("messages")
    .where("from","==",selectedUser)
    .where("to","==",me)
    .get()
    .then(snap=>{
      snap.forEach(d=>{
        d.ref.update({seen:true});
      });
    });
  }

},3000);

/* INIT */
loadUsers();

</script>

</body>
</html>
