<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
}

.container{max-width:700px;margin:auto;padding:10px;}

.box{background:white;padding:10px;margin-top:10px;border-radius:10px;}

.post{background:white;padding:10px;margin-top:10px;border-radius:10px;}

.comment{background:#eee;padding:5px;margin-top:5px;border-radius:5px;}

.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg{
  padding:10px;
  margin:6px;
  border-radius:12px;
  max-width:70%;
}

.me{
  background:linear-gradient(135deg,#1877f2,#4aa3ff);
  color:white;
  margin-left:auto;
}

.other{
  background:#eee;
}

#typing{
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO MAX</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion</h3>
  <input id="name" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- POSTS -->
<div id="postsSection">

  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>
</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

  <div class="box">
    <h3>👥 Étudiants</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <div id="typing"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let selected="";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("name").value,
    document.getElementById("password").value
  )
  .then(u=>{
    me=u.user.email;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    loadPosts();
    loadUsers();
  })
  .catch(e=>alert(e.message));
}

/* SIGNUP */
function signup(){
  auth.createUserWithEmailAndPassword(
    document.getElementById("name").value,
    document.getElementById("password").value
  ).then(()=>alert("Compte créé"));
}

/* POSTS */
function addPost(){
  const text=document.getElementById("postText").value;

  db.collection("posts").add({
    text,
    user:me,
    likes:0,
    time:Date.now()
  });

  document.getElementById("postText").value="";
}

function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    const feed=document.getElementById("feed");
    feed.innerHTML="";

    snap.forEach(doc=>{
      const p=doc.data();

      feed.innerHTML+=`
        <div class="post">
          <b>${p.user}</b>
          <p>${p.text}</p>

          ❤️ ${p.likes||0}
          <button onclick="like('${doc.id}',${p.likes||0})">Like</button>

          <input id="c-${doc.id}">
          <button onclick="comment('${doc.id}')">💬</button>

          <div id="comments-${doc.id}"></div>
        </div>
      `;

      loadComments(doc.id);
    });
  });
}

function like(id,l){
  db.collection("posts").doc(id).update({likes:l+1});
}

/* COMMENTS */
function comment(id){
  const input=document.getElementById("c-"+id);

  db.collection("posts").doc(id)
  .collection("comments").add({
    text:input.value,
    user:me,
    time:Date.now()
  });

  input.value="";
}

function loadComments(id){
  db.collection("posts").doc(id)
  .collection("comments")
  .onSnapshot(s=>{
    const box=document.getElementById("comments-"+id);
    box.innerHTML="";
    s.forEach(d=>{
      const c=d.data();
      box.innerHTML+=`<div class="comment"><b>${c.user}</b>: ${c.text}</div>`;
    });
  });
}

/* USERS */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    const box=document.getElementById("users");
    box.innerHTML="";
    snap.forEach(d=>{
      const u=d.data();
      box.innerHTML+=`<div>👤 ${u.name||u.email}</div>`;
    });
  });
}

/* CHAT */
function sendMsg(){
  const text=document.getElementById("msg").value;

  const chatId=[me,selected].sort().join("_");

  db.collection("chats").doc(chatId)
  .collection("messages").add({
    text,
    from:me,
    time:Date.now(),
    seen:false
  });

  document.getElementById("msg").value="";
}

/* TYPING */
document.getElementById("msg").addEventListener("input",()=>{
  if(!selected) return;

  db.collection("typing").doc([me,selected].sort().join("_"))
  .set({user:me,time:Date.now()});
});

function listenTyping(){
  db.collection("typing").doc([me,selected].sort().join("_"))
  .onSnapshot(doc=>{
    const box=document.getElementById("typing");
    if(!doc.exists) return;

    const d=doc.data();

    if(d.user!==me && Date.now()-d.time<3000){
      box.innerHTML="✍️ "+d.user+" écrit...";
    } else box.innerHTML="";
  });
}

/* CHAT LOAD */
function loadMessages(){
  const chatId=[me,selected].sort().join("_");

  db.collection("chats").doc(chatId)
  .collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    const box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(d=>{
      const m=d.data();

      box.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
          ${m.from===me? (m.seen?" ✓✓":" ✓"):""}
        </div>
      `;

      if(m.from!==me){
        d.ref.update({seen:true});
      }
    });
  });
}

/* OPEN CHAT */
function openChat(u){
  selected=u;
  loadMessages();
  listenTyping();
}

function show(p){
  document.getElementById("postsSection").style.display=p==='posts'?'block':'none';
  document.getElementById("chatSection").style.display=p==='chat'?'block':'none';
}

</script>

</body>
</html>
