<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Academy</title>

<style>
body {
  margin: 0;
  font-family: system-ui, Arial;
  background: #f0f2f5;
}

header {
  background: #1877f2;
  padding: 12px;
  color: white;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

.post {
  background: white;
  padding: 12px;
  margin-top: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, textarea, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #1877f2;
  color: white;
  font-weight: bold;
  border: none;
  cursor: pointer;
}

#loginBox, #registerBox {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

#app {
  display: none;
}
</style>
</head>

<body>

<header>📢 TechNova Academy</header>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h3>Connexion Étudiant</h3>
  <input id="matricule" placeholder="Matricule">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- 🧑‍🎓 INSCRIPTION -->
<div id="registerBox">
  <h3>Créer un compte</h3>
  <input id="r-mat" placeholder="Matricule">
  <input id="r-name" placeholder="Nom">
  <input id="r-pass" type="password" placeholder="Mot de passe">
  <button onclick="register()">S'inscrire</button>
</div>

<!-- 📡 APP -->
<div id="app">
  <div class="container">

    <h3>📢 Publications</h3>

    <input type="password" id="pass" placeholder="Mot de passe admin">
    <textarea id="text" placeholder="Message..."></textarea>
    <button onclick="addPost()">Publier</button>

    <div id="posts"></div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD = "Tk@2026Nova!";
let currentUser = null;

// 🧑‍🎓 INSCRIPTION
function register(){
  const mat = document.getElementById("r-mat").value;
  const name = document.getElementById("r-name").value;
  const pass = document.getElementById("r-pass").value;

  if(!mat || !name || !pass){
    alert("Remplis tous les champs");
    return;
  }

  db.collection("students").doc(mat).set({
    name,
    password: pass
  }).then(()=>{
    alert("Compte créé !");
  }).catch(err=>{
    alert("Erreur inscription: " + err.message);
  });
}

// 🔐 LOGIN (CORRIGÉ + DEBUG)
function login(){

  console.log("LOGIN CLICKED");

  const mat = document.getElementById("matricule").value;
  const pass = document.getElementById("password").value;

  if(!mat || !pass){
    alert("Remplis tous les champs");
    return;
  }

  db.collection("students").doc(mat).get()
  .then(doc=>{

    console.log("FIREBASE OK");

    if(doc.exists){

      const data = doc.data();

      if(data.password === pass){

        currentUser = mat;

        alert("Bienvenue " + data.name);

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("registerBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        loadPosts();

      } else {
        alert("Mot de passe incorrect");
      }

    } else {
      alert("Matricule introuvable");
    }

  })
  .catch(err=>{
    console.error(err);
    alert("Erreur Firebase: " + err.message);
  });
}

// ➕ POST ADMIN
function addPost(){
  const pass = document.getElementById("pass").value;

  if(pass !== ADMIN_PASSWORD){
    alert("Accès refusé");
    return;
  }

  const text = document.getElementById("text").value;

  db.collection("posts").add({
    text,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("text").value = "";
}

// 📡 LOAD POSTS
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snapshot=>{
    const container = document.getElementById("posts");
    container.innerHTML = "";

    snapshot.forEach(doc=>{
      const p = doc.data();

      const div = document.createElement("div");
      div.classList.add("post");

      div.innerHTML = `
        <p>${p.text}</p>
        <p>❤️ ${p.likes || 0}</p>
      `;

      container.appendChild(div);
    });
  });
}

</script>

</body>
</html>
