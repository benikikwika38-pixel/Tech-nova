<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WhatsApp ULTRA NEXT LEVEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#e9edf1;
}

header{
  background:#0a5bd3;
  color:white;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.box{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:12px;
}

.chatBox{
  height:320px;
  overflow:auto;
  background:white;
  padding:10px;
  border-radius:12px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#cfe6ff;margin-left:auto;text-align:right;}
.other{background:#eee;}

.small{
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<header>📱 WhatsApp ULTRA NEXT LEVEL 🔥</header>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <br><br>
  <button onclick="login()">Entrer</button>
  <button onclick="signup()">Créer compte</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="box">
    <h3>👥 Utilisateurs</h3>
    <div id="users"></div>
  </div>

  <div class="box">
    <h3>💬 Chat privé</h3>
    <div class="chatBox" id="chatBox"></div>
  </div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let me="";
let currentChatUser="";

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  )
  .then(u=>{
    me=u.user.email;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    loadUsers();
    presence();
  })
  .catch(e=>alert(e.message));
}

/* SIGNUP (🔥 FIX IMPORTANT) */
function signup(){
  auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  )
  .then(u=>{
    me=u.user.email;

    // 🔥 créer user dans Firestore
    db.collection("users").doc(me).set({
      email: me,
      lastSeen: Date.now()
    });

    alert("Compte créé, connecte-toi maintenant");
  })
  .catch(e=>alert(e.message));
}

/* USERS LIST */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(doc=>{
      let u=doc.data();

      if(u.email !== me){
        box.innerHTML+=`
          <div onclick="openChat('${u.email}')">
            👤 ${u.email}
          </div>
        `;
      }
    });
  });
}

/* OPEN PRIVATE CHAT */
function openChat(user){
  currentChatUser=user;
  loadChat();
}

/* SEND MESSAGE */
function sendMsg(){
  if(!currentChatUser) return alert("Choisis un utilisateur");

  let text=document.getElementById("msg").value;
  if(!text) return;

  let id = [me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id).collection("messages").add({
    text,
    from:me,
    time:Date.now(),
    seen:false
  });

  document.getElementById("msg").value="";
}

/* LOAD CHAT */
function loadChat(){

  let id = [me,currentChatUser].sort().join("_");

  db.collection("chats").doc(id)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{

    let box=document.getElementById("chatBox");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();

      let status = m.seen ? "✔✔" : "✔";

      box.innerHTML+=`
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
          <div class="small">${status}</div>
        </div>
      `;

      if(m.from !== me){
        db.collection("chats").doc(id)
        .collection("messages").doc(doc.id)
        .update({seen:true});
      }

    });

  });
}

/* ONLINE STATUS */
function presence(){
  setInterval(()=>{
    if(me){
      db.collection("users").doc(me).set({
        lastSeen:Date.now()
      },{merge:true});
    }
  },3000);
}

</script>

</body>
</html>
