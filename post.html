<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova Social PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f0f2f5;
}

header{
  background:#1877f2;
  color:white;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px;
}

.nav button{
  border:none;
  background:none;
  font-weight:bold;
  cursor:pointer;
}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.box{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.post{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.comment{
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
  font-size:13px;
}

.chatBox{
  height:300px;
  overflow:auto;
  background:white;
  padding:10px;
}

.msg{
  padding:6px;
  margin:5px;
  border-radius:8px;
}

.me{
  background:#d1e7ff;
  text-align:right;
}

.other{
  background:#eee;
}
</style>
</head>

<body>

<header>📘 TechNova Social PRO</header>

<div class="nav">
  <button onclick="show('posts')">📢 Posts</button>
  <button onclick="show('chat')">💬 Chat</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>🔐 Connexion étudiant</h3>
  <input id="name" placeholder="Nom étudiant">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- POSTS -->
<div id="postsSection">

  <div class="box">
    <textarea id="postText" placeholder="Exprime-toi..."></textarea>
    <input type="file" id="postImage" accept="image/*">
    <button onclick="addPost()">Publier</button>
  </div>

  <div id="feed"></div>

</div>

<!-- CHAT -->
<div id="chatSection" style="display:none;">

  <div class="box">
    <h3>👥 Étudiants</h3>
    <div id="users"></div>
  </div>

  <div class="chatBox" id="chatBox"></div>

  <input id="msg" placeholder="Message...">
  <button onclick="sendMsg()">Envoyer</button>

</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "TA_KEY",
  authDomain: "TON_DOMAIN",
  projectId: "TON_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let me = "";
let selected = "";

/* 🔐 MOT DE PASSE */
const STUDENT_PASSWORD = "jemima";

/* ================= LOGIN ================= */
function login(){

  const name = document.getElementById("name").value;
  const pass = document.getElementById("password").value;

  if(!name){
    alert("Entre ton nom");
    return;
  }

  if(pass !== STUDENT_PASSWORD){
    alert("❌ Mot de passe incorrect");
    return;
  }

  me = name;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  // 🔥 présence en ligne (fix mobile)
  setInterval(()=>{
    db.collection("users").doc(me).set({
      name: me,
      lastSeen: Date.now()
    });
  }, 3000);

  loadPosts();
  loadUsers();
}

/* NAV */
function show(page){
  document.getElementById("postsSection").style.display = page==='posts'?'block':'none';
  document.getElementById("chatSection").style.display = page==='chat'?'block':'none';
}

/* ================= POSTS ================= */

function addPost(){

  const text = document.getElementById("postText").value;
  const file = document.getElementById("postImage").files[0];

  if(!text && !file) return;

  const save = (img="") => {
    db.collection("posts").add({
      text,
      image: img,
      user: me,
      likes: 0,
      time: Date.now()
    });
  };

  if(file){
    const reader = new FileReader();
    reader.onload = () => save(reader.result);
    reader.readAsDataURL(file);
  } else {
    save();
  }

  document.getElementById("postText").value = "";
  document.getElementById("postImage").value = "";
}

function loadPosts(){

  const feed = document.getElementById("feed");

  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snapshot => {

    feed.innerHTML = "";

    snapshot.forEach(doc => {

      const p = doc.data();

      feed.innerHTML += `
        <div class="post">

          <b>${p.user}</b>
          <p>${p.text}</p>

          ${p.image ? `<img src="${p.image}" style="width:100%;border-radius:10px;">` : ""}

          <button onclick="like('${doc.id}',${p.likes || 0})">
            ❤️ ${p.likes || 0}
          </button>

          <input id="c-${doc.id}" placeholder="Commenter">
          <button onclick="comment('${doc.id}')">Envoyer</button>

          <div id="comments-${doc.id}"></div>

        </div>
      `;

      loadComments(doc.id);
    });

  });
}

function like(id, likes){
  db.collection("posts").doc(id).update({
    likes: likes + 1
  });
}

function comment(id){

  const input = document.getElementById("c-"+id);

  db.collection("posts")
  .doc(id)
  .collection("comments")
  .add({
    text: input.value,
    user: me,
    time: Date.now()
  });

  input.value = "";
}

function loadComments(id){

  db.collection("posts")
  .doc(id)
  .collection("comments")
  .onSnapshot(snap=>{

    const box = document.getElementById("comments-"+id);
    if(!box) return;

    box.innerHTML = "";

    snap.forEach(d=>{
      const c = d.data();

      box.innerHTML += `
        <div class="comment">
          <b>${c.user}</b>: ${c.text}
        </div>
      `;
    });

  });
}

/* ================= CHAT ================= */

function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    const box = document.getElementById("users");
    box.innerHTML = "";

    snap.forEach(d=>{
      const u = d.data();

      if(u.name !== me){

        const isOnline = Date.now() - (u.lastSeen || 0) < 5000;

        box.innerHTML += `
          <div onclick="openChat('${u.name}')">
            👤 ${u.name} ${isOnline ? "🟢" : "⚫"}
          </div>
        `;
      }
    });

  });
}

function chatId(a,b){
  return [a,b].sort().join("_");
}

function openChat(u){
  selected = u;
  loadMessages();
}

function sendMsg(){

  const text = document.getElementById("msg").value;
  if(!text || !selected) return;

  db.collection("chats")
  .doc(chatId(me,selected))
  .collection("messages")
  .add({
    text,
    from: me,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

function loadMessages(){

  db.collection("chats")
  .doc(chatId(me,selected))
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{

    const box = document.getElementById("chatBox");
    if(!box) return;

    box.innerHTML = "";

    snap.forEach(d=>{
      const m = d.data();

      box.innerHTML += `
        <div class="msg ${m.from===me?'me':'other'}">
          ${m.text}
        </div>
      `;
    });

  });
}

</script>

</body>
</html>
