<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Social</title>

<style>
body { font-family: Arial; background:#f0f2f5; }

.box {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}

input, button, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
}

.post {
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.comment {
  background:#eee;
  padding:5px;
  margin-top:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="box" id="auth">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>

  <h4>Créer compte</h4>
  <input id="name" placeholder="Nom">
  <button onclick="register()">S'inscrire</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="box">
  <h3 id="profileName"></h3>
  <textarea id="postText" placeholder="Quoi de neuf ?"></textarea>
  <button onclick="addPost()">Publier</button>
</div>

<div id="feed"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// 🔐 INSCRIPTION
function register(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const name = document.getElementById("name").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(user=>{
    db.collection("users").doc(user.user.uid).set({
      name,
      email
    });
  });
}

// 🔐 LOGIN
function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass);
}

// 🔁 SESSION
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user.uid;

    db.collection("users").doc(user.uid).get()
    .then(doc=>{
      document.getElementById("profileName").innerText = doc.data().name;
    });

    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";

    loadPosts();
  }
});

// ➕ POST
function addPost(){
  const text = document.getElementById("postText").value;

  db.collection("posts").add({
    text,
    userId: currentUser,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("postText").value = "";
}

// ❤️ LIKE
function likePost(id, currentLikes){
  db.collection("posts").doc(id).update({
    likes: currentLikes + 1
  });
}

// 💬 COMMENTAIRE
function addComment(postId){
  const input = document.getElementById("c-"+postId);
  const text = input.value;

  if(!text) return;

  db.collection("comments").add({
    postId,
    userId: currentUser,
    text,
    time: Date.now()
  });

  input.value = "";
}

// 📡 LOAD POSTS
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snap=>{
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach(doc=>{
      const p = doc.data();

      db.collection("users").doc(p.userId).get()
      .then(u=>{

        let html = `
          <div class="post">
            <strong>${u.data().name}</strong>
            <p>${p.text}</p>
            <button onclick="likePost('${doc.id}', ${p.likes||0})">
              ❤️ ${p.likes||0}
            </button>

            <div id="comments-${doc.id}"></div>

            <input id="c-${doc.id}" placeholder="Commenter...">
            <button onclick="addComment('${doc.id}')">Envoyer</button>
          </div>
        `;

        feed.innerHTML += html;

        loadComments(doc.id);
      });
    });
  });
}

// 📡 LOAD COMMENTS
function loadComments(postId){
  db.collection("comments")
  .where("postId","==",postId)
  .orderBy("time")
  .onSnapshot(snap=>{
    const div = document.getElementById("comments-"+postId);
    if(!div) return;

    div.innerHTML = "";

    snap.forEach(doc=>{
      const c = doc.data();

      db.collection("users").doc(c.userId).get()
      .then(u=>{
        div.innerHTML += `
          <div class="comment">
            <strong>${u.data().name}</strong> : ${c.text}
          </div>
        `;
      });
    });
  });
}

</script>

</body>
  </html>
