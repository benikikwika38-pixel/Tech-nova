.chapitre strong{
    font-size:28px; /* titre du bloc plus grand */
    color:#2c3e50;
}

button{

    font-size:24px; /* bouton plus gros */
    background:#2980b9;
    color:white;
    border:none;

    cursor:pointer;
}

button:hover{
