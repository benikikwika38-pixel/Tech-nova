<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova - Espace Étudiant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    text-align: center;
    padding: 20px;
    color: #222;
}
h1 {color:#6a0dad; font-size:28px;}
h3 {font-size:18px; margin-top:15px;}
input, select {
    padding: 12px;
    margin: 8px 0;
    width: 90%;
    max-width: 320px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 16px;
}
button {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 6px;
    background: #6a0dad;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {background: #4b078c;}
.box {
    background:#9b59b6;
    color:white;
    max-width:90%;
    margin:auto;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    display:none;
    text-align:left;
    line-height:1.6;
    font-size:16px;
    position: relative;
}
.box img.logo {
    position: absolute;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
}
.signature {
    margin-top:12px;
    font-style:italic;
    color:#ffd700;
    font-size:14px;
}
</style>

<script>

// EMAIL ADMIN
const adminEmail="admin@technova.com";

// Mot de passe général
const motPasseGeneral="TECHBE12";

// Charger les étudiants
let etudiants = JSON.parse(localStorage.getItem("technova_etudiants")) || [];

// Sauvegarder
function sauvegarder(){
    localStorage.setItem("technova_etudiants", JSON.stringify(etudiants));
}

// ENVOI AUTOMATIQUE CHEZ ADMIN
function envoyerAdmin(etudiant){
    let message =
    "Nouvel étudiant TechNova%0A%0A"+
    "Nom : "+etudiant.nom+"%0A"+
    "Matricule : "+etudiant.matricule+"%0A"+
    "Formations : "+etudiant.formations.join(", ");
    let lien="mailto:"+adminEmail+
    "?subject=Nouvel étudiant TechNova"+
    "&body="+message;
    window.open(lien);
}

// Entrée mot de passe général
function entrer(){
    let code=document.getElementById("passGeneral").value.trim();
    if(code===motPasseGeneral){
        document.getElementById("login").style.display="none";
        document.getElementById("menu").style.display="block";
    } else { alert("Mot de passe incorrect"); }
}

// Générer matricule
function genererMatricule(){
    let numero=(etudiants.length+1).toString().padStart(3,"0");
    return "TN-2026-"+numero;
}

// Générer mot de passe
function genererPassword(){
    let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let pass="";
    for(let i=0;i<8;i++){ pass+=chars[Math.floor(Math.random()*chars.length)]; }
    return pass;
}

// Connexion ancien étudiant
function ancien(){
    let matricule=document.getElementById("matriculeLogin").value.trim();
    let mdp=document.getElementById("passAncien").value.trim();

    let etudiant = etudiants.find(e => 
        e.matricule.trim() === matricule &&
        e.motDePasse.trim() === mdp
    );

    if(etudiant){ 
        afficher(etudiant);   
    } else { 
        alert("Matricule ou mot de passe incorrect");   
    }
}

// Nouveau étudiant
function nouveau(){
    let nom=document.getElementById("nom").value.trim();
    let formations=[...document.getElementById("formations").selectedOptions].map(o=>o.value);

    if(nom=="" || formations.length==0){
        alert("Remplissez les informations");
        return;
    }

    let etudiantExistant = etudiants.find(e => 
        e.nom.toLowerCase() === nom.toLowerCase() &&
        JSON.stringify(e.formations) === JSON.stringify(formations)
    );

    if(etudiantExistant){
        alert("Cet espace étudiant existe déjà !\nMatricule : "+etudiantExistant.matricule+"\nMot de passe : "+etudiantExistant.motDePasse);
        afficher(etudiantExistant);
        return;
    }

    let matricule = genererMatricule();
    let mdp = genererPassword();

    // AJOUT : dateInscription
    let etudiant = {
        nom:nom,
        formations:formations,
        matricule:matricule,
        motDePasse:mdp,
        dateInscription: new Date().toLocaleDateString()
    };

    etudiants.push(etudiant);
    sauvegarder();

    /* AJOUT : ENVOI AUTOMATIQUE ADMIN */
    envoyerAdmin(etudiant);

    afficher(etudiant);

    alert("Votre espace a été créé !\nMatricule : "+matricule+"\nMot de passe : "+mdp);
}

// Afficher espace étudiant
function afficher(e){
    document.getElementById("espace").style.display="block";
    document.getElementById("n").innerText=e.nom;
    document.getElementById("f").innerText=e.formations.join(", ");
    document.getElementById("m").innerText=e.matricule;
    document.getElementById("p").innerText=e.motDePasse;
    document.getElementById("d").innerText=e.dateInscription; // <-- date correcte
    document.getElementById("a").innerText="2026-2027";
}

</script>
</head>

<body>

<h1>TechNova Academy</h1>

<div id="login">
<h3>Mot de passe général</h3>
<input type="password" id="passGeneral" placeholder="Mot de passe">
<br>
<button onclick="entrer()">Entrer</button>
</div>

<div id="menu" style="display:none">
<h3>Connexion étudiant existant</h3>
<input type="text" id="matriculeLogin" placeholder="Matricule">
<br>
<input type="password" id="passAncien" placeholder="Mot de passe">
<br>
<button onclick="ancien()">Se connecter</button>

<hr>

<h3>Nouveau étudiant</h3>
<input type="text" id="nom" placeholder="Nom complet">
<br>
<select id="formations" multiple>
<option>Initiation informatique</option>
<option>Word</option>
<option>Excel</option>
<option>Bases de données</option>
<option>Programmation</option>
</select><br>
<button onclick="nouveau()">Créer mon espace</button>
</div>

<!-- Espace étudiant affiché -->
<div class="box" id="espace">
<h3>Espace étudiant</h3>
<p><strong>Nom :</strong> <span id="n"></span></p>
<p><strong>Formations :</strong> <span id="f"></span></p>
<p><strong>Matricule :</strong> <span id="m"></span></p>
<p><strong>Mot de passe :</strong> <span id="p"></span></p>
<p><strong>Date d'inscription :</strong> <span id="d"></span></p>
<p><strong>Année académique :</strong> <span id="a"></span></p>
<p classe="signature">signé par béni kikwika (fondateur)</p>
</div>

</body>
    </html>
