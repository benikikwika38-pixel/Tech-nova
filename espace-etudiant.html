<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova - Espace Étudiant</title>

<style>

body{
font-family:Arial;
background:#f4f4f9;
text-align:center;
padding:40px;
}

h1{
color:#6a0dad;
}

input,select{
padding:10px;
margin:10px;
width:230px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 25px;
background:#6a0dad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4b078c;
}

.box{
background:#6a0dad;
color:white;
max-width:600px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:10px;
display:none;
text-align:left;
}

.signature{
margin-top:15px;
font-style:italic;
color:#ffd700;
}

#adminZone{
margin-top:20px;
}

</style>

<script>

const motPasseGeneral="TECHBE12";

/* charger étudiants enregistrés */
let etudiants=JSON.parse(localStorage.getItem("technova_etudiants"))||[];

/* sauvegarder étudiants */
function sauvegarder(){

localStorage.setItem("technova_etudiants",JSON.stringify(etudiants));

}

function entrer(){

let code=document.getElementById("passGeneral").value.trim();

if(code===motPasseGeneral){

document.getElementById("login").style.display="none";
document.getElementById("menu").style.display="block";

}else{

alert("Mot de passe incorrect");

}

}

function genererMatricule(){

let numero=(etudiants.length+1).toString().padStart(3,"0");

return "TN-2026-"+numero;

}

function genererPassword(){

let caracteres="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let pass="";

for(let i=0;i<8;i++){

pass+=caracteres[Math.floor(Math.random()*caracteres.length)];

}

return pass;

}

function ancien(){

let mdp=document.getElementById("passAncien").value.trim();

let etudiant=etudiants.find(e=>e.motDePasse===mdp);

if(etudiant){

afficher(etudiant);

}else{

alert("Mot de passe étudiant incorrect");

}

}

function nouveau(){

let nom=document.getElementById("nom").value.trim();

let formations=[...document.getElementById("formations").selectedOptions].map(o=>o.value);

if(nom==""||formations.length==0){

alert("Remplissez les informations");

return;

}

let matricule=genererMatricule();

let mdp=genererPassword();

let etudiant={
nom:nom,
formations:formations,
matricule:matricule,
motDePasse:mdp
};

etudiants.push(etudiant);

sauvegarder();

afficher(etudiant);

alert("Votre matricule : "+matricule+"\nVotre mot de passe : "+mdp);

}

function afficher(e){

document.getElementById("espace").style.display="block";

document.getElementById("n").innerText=e.nom;

document.getElementById("f").innerText=e.formations.join(", ");

document.getElementById("m").innerText=e.matricule;

document.getElementById("d").innerText=new Date().toLocaleDateString();

document.getElementById("a").innerText="2026-2027";

}

/* ADMIN */

function ouvrirAdmin(){

document.getElementById("adminPanel").style.display="block";

}

function verifierAdmin(){

let pass=document.getElementById("adminPass").value;

if(pass==="TECHNOVA2026"){

document.getElementById("adminZone").style.display="block";

afficherEtudiants();

}else{

alert("Mot de passe admin incorrect");

}

}

function afficherEtudiants(){

let liste=document.getElementById("listeEtudiants");

liste.innerHTML="";

etudiants.forEach(e=>{

let li=document.createElement("li");

li.innerText="Nom: "+e.nom+" | Matricule: "+e.matricule+" | Formations: "+e.formations.join(", ");

liste.appendChild(li);

});

}

</script>

</head>

<body>

<h1>TechNova Academy</h1>

<div id="login">

<h3>Mot de passe général</h3>

<input type="password" id="passGeneral" placeholder="Mot de passe">

<br>

<button onclick="entrer()">Entrer</button>

</div>

<div id="menu" style="display:none">

<h3>Ancien étudiant</h3>

<input type="password" id="passAncien" placeholder="Mot de passe étudiant">

<br>

<button onclick="ancien()">Accéder</button>

<hr>

<h3>Nouveau étudiant</h3>

<input type="text" id="nom" placeholder="Nom complet">

<br>

<select id="formations" multiple>

<option>Initiation informatique</option>
<option>Word</option>
<option>Excel</option>
<option>Bases de données</option>
<option>Programmation</option>

</select>

<br>

<button onclick="nouveau()">Créer espace</button>

<br><br>

<button onclick="ouvrirAdmin()">Admin</button>

</div>

<div id="espace" class="box">

<h3>Carte Étudiante TechNova</h3>

<p><b>Nom :</b> <span id="n"></span></p>

<p><b>Formations :</b> <span id="f"></span></p>

<p><b>Matricule :</b> <span id="m"></span></p>

<p><b>Date d'inscription :</b> <span id="d"></span></p>

<p><b>Année académique :</b> <span id="a"></span></p>

<p><b>Accès aux cours :</b> Activé ✅</p>

<p class="signature">
Signé par le fondateur  
Béni Kikwika
</p>

</div>

<div id="adminPanel" style="display:none">

<h3>Connexion Admin</h3>

<input type="password" id="adminPass" placeholder="Mot de passe admin">

<br><br>

<button onclick="verifierAdmin()">Entrer</button>

<div id="adminZone" style="display:none">

<h3>Liste des étudiants TechNova</h3>

<ul id="listeEtudiants"></ul>

</div>

</div>

</body>
</html>
