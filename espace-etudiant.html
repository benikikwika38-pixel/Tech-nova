<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>TechNova - Espace Étudiant</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f9;
    text-align: center;
    padding: 40px;
    color: #222;
}
h1 {color:#6a0dad; font-size:32px;}
h3 {font-size:20px; margin-top:20px;}
input, select {
    padding: 14px;
    margin: 10px;
    width: 320px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 18px;
}
button {
    padding: 14px 35px;
    font-size: 20px;
    border-radius: 6px;
    background: #6a0dad;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {background: #4b078c;}
.box {
    background:#9b59b6;
    color:white;
    max-width:600px;
    margin:auto;
    margin-top:30px;
    padding:25px;
    border-radius:10px;
    display:none;
    text-align:left;
    line-height:1.6;
    font-size:18px;
}
.signature {
    margin-top:15px;
    font-style:italic;
    color:#ffd700;
    font-size:16px;
}
#adminPanel {display:none; margin-top:30px; text-align:left; font-size:16px;}
#listeEtudiants li {margin:5px 0;}
</style>
<script>
// Mot de passe général
const motPasseGeneral="TECHBE12";

// Charger étudiants depuis localStorage
let etudiants = JSON.parse(localStorage.getItem("technova_etudiants")) || [];

// Sauvegarder étudiants
function sauvegarder(){
    localStorage.setItem("technova_etudiants", JSON.stringify(etudiants));
}

// Entrée mot de passe général
function entrer(){
    let code=document.getElementById("passGeneral").value.trim();
    if(code===motPasseGeneral){
        document.getElementById("login").style.display="none";
        document.getElementById("menu").style.display="block";
    } else { alert("Mot de passe incorrect"); }
}

// Générer matricule
function genererMatricule(){
    let numero=(etudiants.length+1).toString().padStart(3,"0");
    return "TN-2026-"+numero;
}

// Générer mot de passe aléatoire
function genererPassword(){
    let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let pass="";
    for(let i=0;i<8;i++){ pass+=chars[Math.floor(Math.random()*chars.length)]; }
    return pass;
}

// Connexion ancien étudiant
function ancien(){
    let matricule=document.getElementById("matriculeLogin").value.trim();
    let mdp=document.getElementById("passAncien").value.trim();
    let etudiant=etudiants.find(e=>e.matricule===matricule && e.motDePasse===mdp);
    if(etudiant){ afficher(etudiant); }
    else { alert("Matricule ou mot de passe incorrect"); }
}

// Nouveau étudiant
function nouveau(){
    let nom=document.getElementById("nom").value.trim();
    let formations=[...document.getElementById("formations").selectedOptions].map(o=>o.value);
    if(nom=="" || formations.length==0){ alert("Remplissez les informations"); return; }

    // Vérifier si l'étudiant existe déjà
    let etudiantExistant = etudiants.find(e => e.nom === nom && JSON.stringify(e.formations) === JSON.stringify(formations));

    if(etudiantExistant){
        alert("Cet espace étudiant existe déjà !\nMatricule : "+etudiantExistant.matricule+"\nMot de passe : "+etudiantExistant.motDePasse);
        afficher(etudiantExistant);
        return;
    }

    // Sinon créer un nouvel étudiant
    let matricule = genererMatricule();
    let mdp = genererPassword();
    let etudiant = {nom:nom, formations:formations, matricule:matricule, motDePasse:mdp};
    etudiants.push(etudiant);
    sauvegarder();
    afficher(etudiant);
    alert("Votre espace a été créé !\nMatricule : "+matricule+"\nMot de passe : "+mdp);
}

// Afficher espace étudiant
function afficher(e){
    document.getElementById("espace").style.display="block";
    document.getElementById("n").innerText=e.nom;
    document.getElementById("f").innerText=e.formations.join(", ");
    document.getElementById("m").innerText=e.matricule;
    document.getElementById("d").innerText=new Date().toLocaleDateString();
    document.getElementById("a").innerText="2026-2027";
}

// Admin
function verifierAdmin(){
    let pass=document.getElementById("adminPass").value.trim();
    if(pass==="TECHNOVA2026"){
        document.getElementById("adminPanel").style.display="block";
        afficherEtudiants();
    } else { alert("Mot de passe admin incorrect"); }
}

function afficherEtudiants(){
    let liste = document.getElementById("listeEtudiants");
    liste.innerHTML = "";
    etudiants.forEach(e=>{
        let li=document.createElement("li");
        li.innerText=`Nom: ${e.nom} | Matricule: ${e.matricule} | Formations: ${e.formations.join(", ")} | Mot de passe: ${e.motDePasse}`;
        liste.appendChild(li);
    });
}
</script>
</head>
<body>

<h1>TechNova Academy</h1>

<!-- Mot de passe général -->
<div id="login">
<h3>Mot de passe général</h3>
<input type="password" id="passGeneral" placeholder="Mot de passe">
<br>
<button onclick="entrer()">Entrer</button>
</div>

<!-- Menu principal -->
<div id="menu" style="display:none">

<h3>Connexion étudiant existant</h3>
<input type="text" id="matriculeLogin" placeholder="Matricule">
<br>
<input type="password" id="passAncien" placeholder="Mot de passe">
<br>
<button onclick="ancien()">Se connecter</button>

<hr>

<h3>Nouveau étudiant</h3>
<input type="text" id="nom" placeholder="Nom complet">
<br>
<select id="formations" multiple>
<option>Initiation informatique</option>
<option>Word</option>
<option>Excel</option>
<option>Bases de données</option>
<option>Programmation</option>
</select>
<br>
<button onclick="nouveau()">Créer espace</button>

<hr>

<h3>Admin</h3>
<input type="password" id="adminPass" placeholder="Mot de passe admin">
<br>
<button onclick="verifierAdmin()">Ouvrir Admin</button>

<div id="adminPanel">
<h4>Liste des étudiants</h4>
<ul id="listeEtudiants"></ul>
</div>

</div>

<!-- Espace étudiant affiché -->
<div class="box" id="espace">
<p><strong>Nom :</strong> <span id="n"></span></p>
<p><strong>Formations :</strong> <span id="f"></span></p>
<p><strong>Matricule :</strong> <span id="m"></span></p>
<p><strong>Date d'inscription :</strong> <span id="d"></span></p>
<p><strong>Année :</strong> <span id="a"></span></p>
<p class="signature">Signé par le fondateur Béni Kikwika</p>
</div>

</body>
</html>
