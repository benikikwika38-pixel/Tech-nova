<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formations - TechNova Academy</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:700px;
background:white;
padding:50px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
text-align:center;
}

h1{
font-size:50px;
color:#2c3e50;
margin-bottom:30px;
}

p{
font-size:26px;
}

select{
width:100%;
font-size:24px;
padding:15px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

input{
width:100%;
font-size:24px;
padding:15px;
margin-top:20px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
font-size:26px;
padding:18px;
margin-top:30px;
background:#2980b9;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1f618d;
}

</style>

</head>

<body>

<div class="container">

<h1>TechNova Academy</h1>

<p>Choisissez votre formation :</p>

<select id="formation">

<option value="initiation">Initiation à l'informatique</option>

<option value="database">Base de données</option>

<option value="excel">Microsoft Excel</option>

<option value="word">Microsoft Word</option>

</select>

<p>Entrez votre code :</p>

<input type="text" id="code" placeholder="Code de formation">

<button onclick="verifier()">Accéder au cours</button>

</div>

<script>

function verifier(){

let formation = document.getElementById("formation").value;
let code = document.getElementById("code").value.trim();

if(formation === "initiation" && code === "INIT2026"){
window.location.href="initiation.html";
}

else if(formation === "database" && code === "DB2026"){
window.location.href="database.html";
}

else if(formation === "excel" && code === "EXCEL2026"){
window.location.href="excel.html";
}

else if(formation === "word" && code === "WORD2026"){
window.location.href="word.html";
}

else{
alert("Code incorrect pour cette formation");
}

}

</script>

</body>
</html>
