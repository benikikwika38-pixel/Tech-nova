<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Academy – Communauté des Érudits</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
font-family:'Georgia',serif;
background:#f4f4f9;
margin:0;
color:#222;
}

/* CODE GATE */
#codeGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

#codeGate input{
padding:10px;
margin:10px;
width:220px;
text-align:center;
border-radius:5px;
border:none;
}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#2c3e50;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9999;
}

#loginBox input{
padding:10px;
margin:5px;
width:220px;
border-radius:5px;
border:none;
}

/* HEADER */
header{
background:#2c3e50;
color:white;
text-align:center;
padding:50px 20px;
}

button{
padding:12px 25px;
background:#2980b9;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

footer{
text-align:center;
margin:40px;
color:#555;
}
</style>
</head>

<body>

<!-- 🔐 CODE GATE -->
<div id="codeGate">
<h2>🔐 Accès sécurisé TechNova</h2>
<input id="accessCode" placeholder="Entrer le code">
<button onclick="checkCode()">Valider</button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Bienvenue dans TechNova</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
</div>

<header>
<h1>TechNova Academy</h1>
<p>Communauté des érudits</p>
</header>

<section>
<h2>À propos</h2>
<p>TechNova Academy forme des esprits ambitieux.</p>
</section>

<footer>© 2026 TechNova Academy</footer>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 TA VRAIE CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959",
  measurementId: "G-9X1R7Q9S5G"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔐 CODE SECRET */
const SECRET_CODE = "TECH2026";

/* ================= CODE GATE ================= */
window.checkCode = function(){
let code=document.getElementById("accessCode").value;

if(code === SECRET_CODE){
document.getElementById("codeGate").style.display="none";
document.getElementById("loginBox").style.display="flex";
}else{
alert("❌ Code incorrect");
}
};

/* ================= LOGIN ================= */
window.login = function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Connexion réussie ✅");
document.getElementById("loginBox").style.display="none";
})
.catch(e=>{
alert("Erreur : " + e.message);
});
};

/* PROTECTION */
onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("loginBox").style.display="none";
}else{
document.getElementById("loginBox").style.display="flex";
}
});

</script>

</body>
</html>
