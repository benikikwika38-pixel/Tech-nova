<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Academy</title>

<style>
body{
font-family:Georgia;
margin:0;
background:#f4f4f9;
color:#222;
}

/* CODE GATE */
#codeGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#codeGate input{
padding:10px;
width:220px;
margin:10px;
text-align:center;
}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#2c3e50;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9998;
}

#loginBox input{
padding:10px;
width:220px;
margin:5px;
}

button{
padding:10px 20px;
background:#2980b9;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔐 CODE GATE -->
<div id="codeGate">
<h2>🔐 Accès sécurisé TechNova</h2>
<input id="accessCode" placeholder="Entrer le code">
<button onclick="checkCode()">Valider</button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Bienvenue dans TechNova</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
</div>

<!-- ================= FIREBASE CDN ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 TA CONFIG FIREBASE (CORRECTE) */
const firebaseConfig = {
  apiKey: "AIzaSyAFPw3pHfHBrd2SaNuSdkqdLonID_Sr2hQ",
  authDomain: "technova-academy.firebaseapp.com",
  projectId: "technova-academy",
  storageBucket: "technova-academy.appspot.com",
  messagingSenderId: "321716769948",
  appId: "1:321716769948:web:c8e2d7a4d3e6be795e0959",
  measurementId: "G-9X1R7Q9S5G"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔐 CODE SECRET */
const SECRET_CODE = "TECH2026";

/* ================= CODE GATE ================= */
window.checkCode = function(){
let code = document.getElementById("accessCode").value;

if(code === SECRET_CODE){
document.getElementById("codeGate").style.display="none";
document.getElementById("loginBox").style.display="flex";
}else{
alert("❌ Code incorrect");
}
};

/* ================= LOGIN ================= */
window.login = function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("Connexion réussie ✅");
document.getElementById("loginBox").style.display="none";
})
.catch(e=>{
alert("Erreur : " + e.message);
});
};

</script>

</body>
</html>
