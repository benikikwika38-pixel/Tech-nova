<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Academy – Communauté des Érudits</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
font-family:'Georgia',serif;
background:#f4f4f9;
margin:0;
color:#222;
}

/* CODE GATE */
#codeGate{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

#codeGate input{
padding:10px;
margin:10px;
width:220px;
text-align:center;
border-radius:5px;
border:none;
}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#2c3e50;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:9999;
}

#loginBox input{
padding:10px;
margin:5px;
width:220px;
border-radius:5px;
border:none;
}

/* RESTE IDENTIQUE */
header{background:#2c3e50;color:white;text-align:center;padding:50px 20px;position:relative;}
.menu{position:absolute;top:20px;right:25px;font-size:28px;cursor:pointer;}
nav{display:none;background:#2c3e50;position:absolute;top:80px;right:20px;border-radius:8px;}
nav a{display:block;color:white;padding:12px;text-decoration:none;}
section{max-width:900px;margin:40px auto;padding:20px;background:white;border-radius:10px;}
button{padding:12px 25px;background:#2980b9;color:white;border:none;border-radius:8px;}
footer{text-align:center;margin:40px;color:#555;}
</style>
</head>

<body>

<!-- 🔐 CODE GATE -->
<div id="codeGate">
<h2>🔐 Accès sécurisé TechNova</h2>
<input id="accessCode" placeholder="Entrer le code">
<button onclick="checkCode()">Valider</button>
</div>

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Connexion TechNova</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Se connecter</button>
</div>

<header>
<div class="menu" onclick="toggleMenu()">☰</div>
<h1>TechNova Academy</h1>
<p>Communauté des érudits</p>

<nav id="menu">
<a href="#">Cours</a>
<a href="#">IA</a>
<a href="#">Chat</a>
</nav>
</header>

<section>
<h2>À propos</h2>
<p>TechNova Academy forme des esprits ambitieux.</p>
</section>

<footer>© 2026 TechNova Academy</footer>

<script>
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="block"?"none":"block";
}
</script>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getDatabase, ref, set, get } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "TON_API_KEY",
authDomain: "TON_PROJECT.firebaseapp.com",
projectId: "TON_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* 🔐 CODE */
const SECRET_CODE = "TECH2026";

/* 📱 DEVICE ID */
function getDeviceId(){
let id = localStorage.getItem("device_id");
if(!id){
id = crypto.randomUUID();
localStorage.setItem("device_id", id);
}
return id;
}

/* ================= IMPORTANT FIX ================= */
/* 🔥 rendre fonction accessible bouton */
window.checkCode = function(){
let code=document.getElementById("accessCode").value;

if(code === SECRET_CODE){
document.getElementById("codeGate").style.display="none";
document.getElementById("loginBox").style.display="flex";
}else{
alert("❌ Code incorrect");
}
};

window.login = function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(async (userCred)=>{

const user=userCred.user;
const deviceId=getDeviceId();

await set(ref(db,"devices/"+user.uid),{
deviceId:deviceId
});

})
.catch(e=>alert(e.message));
};

/* PROTECTION */
onAuthStateChanged(auth,user=>{
if(user){
document.getElementById("loginBox").style.display="none";
}else{
document.getElementById("loginBox").style.display="flex";
}
});

</script>

</body>
</html>
