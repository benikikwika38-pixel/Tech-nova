<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificat TechNova</title>
<style>
body {
    font-family: 'Georgia', serif;
    background: #f4f4f9;
    margin: 0;
    padding: 0;
    text-align: center;
}

.certificate {
    max-width: 900px;
    margin: 50px auto;
    padding: 50px 30px;
    border: 10px solid #d4af37; /* cadre doré */
    border-radius: 15px;
    background: #fff;
    position: relative;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.certificate h1 {
    font-size: 2.5em;
    color: #2c3e50;
    margin-bottom: 10px;
}

.certificate h2 {
    font-size: 2em;
    color: #34495e;
    margin: 20px 0;
}

.certificate p {
    font-size: 1.2em;
    line-height: 1.6em;
    margin: 15px 0;
}

.logo {
    position: absolute;
    top: 30px;
    right: 30px;
    width: 120px;
}

.signature {
    margin-top: 50px;
    text-align: right;
    font-style: italic;
    font-size: 1.1em;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2980b9;
    color: white;
    margin-top: 30px;
}

button:hover {
    background: #1f618d;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="certificate">
    <!-- Logo en haut à droite -->
    <img src="TechNova/logo-technova.png" alt="Logo TechNova" class="logo">

    <h1>Certificat d'Érudition</h1>
    <h2>TechNova Academy</h2>
    <p>Ce certificat est décerné à :</p>
    <h2 id="nomEtudiant">[Nom de l'étudiant]</h2>
    <p>Pour sa participation et réussite aux formations de TechNova Academy.</p>

    <div class="signature">
        Signé par Béni Kikwika (Fondateur)
    </div>
</div>

<!-- Boutons -->
<button onclick="verifierEtudiant()">🔐 Vérifier matricule</button>
<button onclick="telechargerPDF()">🖨 Télécharger PDF</button>

<script>
// Vérification fictive (à remplacer par vraie vérification depuis admin)
function verifierEtudiant(){
    let matricule = prompt("Entrez le matricule pour vérifier le certificat");
    if(matricule){
        alert("Certificat vérifié pour le matricule : " + matricule);
    }
}

// Télécharger en PDF
function telechargerPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.html(document.querySelector(".certificate"), {
        callback: function (doc) {
            doc.save("Certificat_TechNova.pdf");
        },
        x: 10,
        y: 10,
        width: 180
    });
}
</script>

</body>
</html>
