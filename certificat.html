<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificat TechNova – Université</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- QR CODE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: 'Georgia', serif;
    background: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.certificat {
    width: 900px;
    height: 500px;
    background: #fff;
    border: 12px solid gold;
    border-radius: 10px;
    padding: 50px 40px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    position: relative;
    text-align: center;
}

.logo {
    width: 120px;
    position: absolute;
    top: 20px;
    right: 20px;
}

.qrcode{
    position:absolute;
    bottom:40px;
    left:40px;
}

.numero{
    position:absolute;
    top:20px;
    left:30px;
    font-weight:bold;
}

h1{
    font-size:3em;
    color:#b8860b;
    margin-bottom:5px;
}

h2{
    font-size:2em;
    color:#2c3e50;
}

p{
    font-size:1.3em;
}

.signature{
    position:absolute;
    bottom:40px;
    right:40px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="certificat" id="certificat">

<div class="numero" id="numeroCertificat"></div>

<img src="logo-technova.png" class="logo">

<h1>CERTIFICAT DE RÉUSSITE</h1>
<h2>TechNova Academy</h2>

<p>Ce certificat est décerné à :</p>
<input type="text" id="nomEtudiant" placeholder="Nom de l'étudiant">

<p>Pour avoir complété avec succès la formation :</p>
<p id="formationText"></p>

<input type="text" id="matriculeInput" placeholder="Entrez votre matricule">

<br><br>

<button onclick="verifierEtudiant()">Vérifier et Télécharger PDF</button>

<div id="qrcode" class="qrcode"></div>

<div class="signature">
Signé par Béni Kikwika (Fondateur)
</div>

</div>

<script>

function genererNumeroCertificat(){
    const numero = "TN-" + Date.now();
    return numero;
}

async function verifierEtudiant(){

const nom = document.getElementById("nomEtudiant").value.trim();
const matricule = document.getElementById("matriculeInput").value.trim();

const etudiants = JSON.parse(localStorage.getItem("technova_etudiants")) || [];

const etu = etudiants.find(e => e.nom === nom && e.matricule === matricule);

if(!etu){
alert("Aucun étudiant trouvé !");
return;
}

document.getElementById("formationText").innerText = etu.formation;

const numero = genererNumeroCertificat();

document.getElementById("numeroCertificat").innerText = "Certificat N° : " + numero;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"),{
text: "Certificat TechNova\nNom:"+nom+"\nMatricule:"+matricule+"\nNumero:"+numero,
width:100,
height:100
});

const certificatEl = document.getElementById("certificat");

const canvas = await html2canvas(certificatEl,{scale:3});

const imgData = canvas.toDataURL("image/png");

const { jsPDF } = window.jspdf;

const pdf = new jsPDF({
orientation:"landscape",
unit:"mm",
format:"a4"
});

const pageWidth = pdf.internal.pageSize.getWidth();
const pageHeight = pdf.internal.pageSize.getHeight();

pdf.addImage(imgData,"PNG",0,0,pageWidth,pageHeight);

pdf.save("Certificat_"+nom+".pdf");

}

</script>

</body>
</html>
