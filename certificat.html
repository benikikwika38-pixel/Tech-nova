<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificat TechNova – Université</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
    font-family: 'Georgia', serif;
    background: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.certificat {
    width: 850px;
    background: #fff;
    border: 10px solid gold;
    border-radius: 20px;
    padding: 50px 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
    text-align: center;
}
.certificat .logo {
    width: 120px;
    position: absolute;
    top: 20px;
    right: 20px;
}
h1 { font-size: 3em; color: #b8860b; margin-bottom: 10px; }
h2 { font-size: 2em; margin-bottom: 30px; color: #333; }
p { font-size: 1.3em; margin: 20px 0; line-height: 1.6em; }
input[type="text"] { font-size: 1.1em; padding: 10px; width: 300px; margin: 10px 0 20px 0; border-radius: 6px; border: 1px solid #aaa; text-align: center; }
button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; background: #2980b9; color: white; margin-top: 20px; transition: 0.3s; }
button:hover { background: #1f618d; }
.signature { margin-top: 60px; font-weight: bold; font-size: 1.1em; color: #2c3e50; text-align: right; }
</style>
</head>
<body>

<div class="certificat">
    <img src="logo-technova.png" alt="Logo TechNova" class="logo" id="logo">
    <h1>Certificat de Réussite</h1>
    <h2>TechNova Academy</h2>

    <p>Ce certificat est décerné à :</p>
    <input type="text" id="nomEtudiant" placeholder="Nom de l'étudiant">

    <p>Pour avoir complété avec succès la formation :</p>
    <p id="formationText"></p>

    <input type="text" id="matriculeInput" placeholder="Entrez votre matricule pour vérification">

    <button onclick="verifierEtudiant()">Vérifier et Télécharger PDF</button>

    <div class="signature">Signé par Béni Kikwika (Fondateur)</div>
</div>

<script>
async function verifierEtudiant() {
    const nom = document.getElementById("nomEtudiant").value.trim();
    const matricule = document.getElementById("matriculeInput").value.trim();
    const etudiants = JSON.parse(localStorage.getItem("technova_etudiants")) || [];
    const etu = etudiants.find(e => e.nom === nom && e.matricule === matricule);

    if(!etu){
        alert("Aucun étudiant trouvé avec ce nom et ce matricule !");
        return;
    }

    document.getElementById("formationText").innerText = etu.formation;

    // Génération PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({orientation: "landscape", unit: "pt", format: [595, 420]});
    doc.setFont("times", "normal");
    doc.setFontSize(30);
    doc.setTextColor(184, 134, 11);
    doc.text("Certificat de Réussite", 297, 80, {align: "center"});
    doc.setFontSize(22);
    doc.setTextColor(0,0,0);
    doc.text(`Décerné à : ${etu.nom}`, 297, 150, {align: "center"});
    doc.text(`Formation : ${etu.formation}`, 297, 190, {align: "center"});
    doc.text(`Matricule : ${etu.matricule}`, 297, 230, {align: "center"});
    doc.setFontSize(18);
    doc.text("Signé par Béni Kikwika (Fondateur)", 540, 380);

    // Charger le logo correctement avant PDF
    const logo = document.getElementById("logo");
    const img = new Image();
    img.src = logo.src;
    img.onload = function() {
        doc.addImage(img, "PNG", 420, 20, 120, 120);
        doc.save(`Certificat_${etu.nom}.pdf`);
    };
}
</script>

</body>
</html>
