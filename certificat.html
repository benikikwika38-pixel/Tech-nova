<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificat TechNova – Université</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
    font-family: 'Georgia', serif;
    background: #f4f4f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.certificat {
    width: 900px; /* largeur augmentée pour plus de rectangle */
    height: 500px; /* hauteur réduite pour rendre rectangulaire */
    background: #fff;
    border: 12px solid gold;
    border-radius: 10px;
    padding: 50px 40px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    position: relative;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.certificat .logo {
    width: 120px;
    position: absolute;
    top: 20px;
    right: 20px;
}
h1 { 
    font-size: 3em; 
    color: #b8860b; 
    margin-bottom: 5px; 
    font-weight: bold; 
    letter-spacing: 2px;
}
h2 { 
    font-size: 2em; 
    color: #2c3e50; 
    margin-bottom: 20px; 
}
p { 
    font-size: 1.3em; 
    margin: 15px 0; 
    line-height: 1.5em; 
}
input[type="text"] { 
    font-size: 1.1em; 
    padding: 10px; 
    width: 300px; 
    margin: 10px 0 20px 0; 
    border-radius: 6px; 
    border: 1px solid #aaa; 
    text-align: center; 
}
button { 
    padding: 12px 25px; 
    font-size: 16px; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    background: #2980b9; 
    color: white; 
    margin-top: 20px; 
    transition: 0.3s; 
}
button:hover { 
    background: #1f618d; 
}
.signature { 
    margin-top: 30px; 
    font-weight: bold; 
    font-size: 1.1em; 
    color: #2c3e50; 
    text-align: right; 
    font-style: italic; 
}
</style>
</head>
<body>
<div class="certificat" id="certificat">
    <img src="logo-technova.png" alt="Logo TechNova" class="logo" id="logo">
    <h1>CERTIFICAT DE RÉUSSITE</h1>
    <h2>TechNova Academy</h2>

    <p>Ce certificat est décerné à :</p>
    <input type="text" id="nomEtudiant" placeholder="Nom de l'étudiant">

    <p>Pour avoir complété avec succès la formation :</p>
    <p id="formationText" style="font-weight:bold;"></p>

    <input type="text" id="matriculeInput" placeholder="Entrez votre matricule pour vérification">

    <button onclick="verifierEtudiant()">Vérifier et Télécharger PDF</button>

    <div class="signature">Signé par Béni Kikwika (Fondateur)</div>
</div>

<script>
async function verifierEtudiant() {
    const nom = document.getElementById("nomEtudiant").value.trim();
    const matricule = document.getElementById("matriculeInput").value.trim();
    const etudiants = JSON.parse(localStorage.getItem("technova_etudiants")) || [];
    const etu = etudiants.find(e => e.nom === nom && e.matricule === matricule);

    if(!etu){
        alert("Aucun étudiant trouvé avec ce nom et ce matricule !");
        return;
    }

    document.getElementById("formationText").innerText = etu.formation;

    const certificatEl = document.getElementById("certificat");

    // html2canvas avec scale pour haute qualité
    const canvas = await html2canvas(certificatEl, { scale: 3 });
    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    // PDF format paysage rectangulaire (proportion proche du div)
    const pdfWidth = 900;
    const pdfHeight = 500;

    const ratio = Math.min(pdfWidth / canvas.width, pdfHeight / canvas.height);
    const imgWidth = canvas.width * ratio;
    const imgHeight = canvas.height * ratio;

    const x = (pdfWidth - imgWidth) / 2;
    const y = (pdfHeight - imgHeight) / 2;

    const pdf = new jsPDF({orientation: "landscape", unit: "pt", format: [pdfWidth, pdfHeight]});
    pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);
    pdf.save(`Certificat_${etu.nom}.pdf`);
}
</script>
</body>
</html>
