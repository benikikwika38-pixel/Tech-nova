<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificat TechNova</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Georgia,serif;
background:#eef1f5;
text-align:center;
padding:40px;
}

input{
padding:10px;
font-size:16px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
background:#2980b9;
color:white;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#1f618d;
}

/* CERTIFICAT */

#certificat{
display:none;
margin-top:40px;
padding:60px;
background:white;
border:12px solid gold;
border-radius:10px;
max-width:900px;
margin-left:auto;
margin-right:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
position:relative;
}

/* LOGO */

.logo{
position:absolute;
top:20px;
right:30px;
width:120px;
}

/* TITRE */

.titre{
font-size:36px;
font-weight:bold;
margin-bottom:20px;
color:#2c3e50;
}

.nom{
font-size:40px;
font-weight:bold;
margin:25px 0;
}

.formation{
font-size:24px;
margin:20px 0;
}

/* SIGNATURE */

.signature{
margin-top:50px;
text-align:right;
font-style:italic;
font-size:18px;
}

</style>
</head>

<body>

<h2>Accéder à votre certificat</h2>

<input type="text" id="matricule" placeholder="Entrer votre matricule">

<br>

<button onclick="verifier()">Voir mon certificat</button>

<div id="certificat">

<img src="logo-technova.png" class="logo">

<div class="titre">CERTIFICAT DE RÉUSSITE</div>

<p>Ce certificat est décerné à</p>

<div class="nom" id="nom"></div>

<p>Pour avoir complété avec succès la formation</p>

<div class="formation" id="formation"></div>

<p>À</p>

<h2>TechNova Academy</h2>

<p>Année académique 2026</p>

<div class="signature">
Signé par Béni Kikwika (Fondateur)
</div>

<br>

<button onclick="telechargerPDF()">🖨 Télécharger PDF</button>

</div>

<script>

function verifier(){

let matricule=document.getElementById("matricule").value;

let etudiants=JSON.parse(localStorage.getItem("technova_etudiants"))||[];

let trouve=false;

etudiants.forEach(e=>{

if(e.matricule===matricule){

document.getElementById("nom").innerText=e.nom;

document.getElementById("formation").innerText=e.formation;

document.getElementById("certificat").style.display="block";

trouve=true;

}

});

if(!trouve){

alert("Matricule incorrect ou étudiant non trouvé");

}

}

function telechargerPDF(){

const { jsPDF } = window.jspdf;

html2canvas(document.querySelector("#certificat")).then(canvas=>{

const imgData=canvas.toDataURL("image/png");

const pdf=new jsPDF("landscape");

const width=pdf.internal.pageSize.getWidth();

const height=canvas.height*width/canvas.width;

pdf.addImage(imgData,"PNG",0,10,width,height);

pdf.save("Certificat-TechNova.pdf");

});

}

</script>

</body>
    </html>
