<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin TechNova</title>
<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f4f9;
    text-align:center;
    padding:30px;
}
h1{
    color:#2c3e50;
}
#compteur{
    font-size:1.1em;
    margin-bottom:15px;
}
table{
    width:95%;
    margin:auto;
    border-collapse:collapse;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
th,td{
    padding:12px;
    border:1px solid #ddd;
}
th{
    background:#2c3e50;
    color:white;
}
button{
    padding:6px 12px;
    margin:3px;
    border:none;
    border-radius:6px;
    background:#2980b9;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#1f618d;
}
input[type="text"], input[type="number"], input[type="password"]{
    width:90%;
    padding:6px;
    margin:3px 0;
    border-radius:4px;
    border:1px solid #ccc;
}
</style>
</head>
<body>

<h1>Administration TechNova</h1>
<p id="compteur">Nombre d’étudiants inscrits : 0</p>

<table id="tableEtudiants">
<tr>
<th>Nom</th>
<th>Formation</th>
<th>Matricule</th>
<th>Mot de passe</th>
<th>Actions</th>
</tr>
</table>

<script>
// Récupérer les étudiants depuis localStorage
function getEtudiants(){
    return JSON.parse(localStorage.getItem("technova_etudiants")) || [];
}

// Sauvegarder étudiants dans localStorage
function saveEtudiants(etudiants){
    localStorage.setItem("technova_etudiants", JSON.stringify(etudiants));
}

// Afficher les étudiants dans le tableau
function afficherEtudiants(){
    let etudiants = getEtudiants();
    let table = document.getElementById("tableEtudiants");
    table.innerHTML = `
    <tr>
    <th>Nom</th>
    <th>Formation</th>
    <th>Matricule</th>
    <th>Mot de passe</th>
    <th>Actions</th>
    </tr>
    `;
    document.getElementById("compteur").innerText = `Nombre d’étudiants inscrits : ${etudiants.length}`;
    etudiants.forEach((e, index) => {
        table.innerHTML += `
        <tr>
        <td><input type="text" value="${e.nom}" id="nom${index}"></td>
        <td><input type="text" value="${e.formation}" id="formation${index}"></td>
        <td>${e.matricule}</td>
        <td><input type="password" value="${e.password}" id="password${index}"></td>
        <td>
            <button onclick="modifierEtudiant(${index})">Modifier</button>
            <button onclick="supprimerEtudiant(${index})">Supprimer</button>
        </td>
        </tr>
        `;
    });
}

// Modifier un étudiant
function modifierEtudiant(index){
    let etudiants = getEtudiants();
    etudiants[index].nom = document.getElementById(`nom${index}`).value.trim();
    etudiants[index].formation = document.getElementById(`formation${index}`).value.trim();
    etudiants[index].password = document.getElementById(`password${index}`).value.trim();
    saveEtudiants(etudiants);
    alert("Informations modifiées !");
    afficherEtudiants();
}

// Supprimer un étudiant
function supprimerEtudiant(index){
    if(confirm("Voulez-vous vraiment supprimer cet étudiant ?")){
        let etudiants = getEtudiants();
        etudiants.splice(index,1);
        saveEtudiants(etudiants);
        afficherEtudiants();
    }
}

// Charger la table au démarrage
window.onload = afficherEtudiants;
</script>

</body>
</html>
