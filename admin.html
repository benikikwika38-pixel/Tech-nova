<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin TechNova – Érudit</title>
<style>
body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:20px;
    text-align:center;
}
h1{
    color:#2c3e50;
    margin-bottom:10px;
}
#compteur{
    font-size:1.3em;
    margin-bottom:20px;
    font-weight:bold;
    color:#34495e;
}
.table-container{
    width:100%;
    overflow-x:auto;
    margin-bottom:30px;
}
table{
    width:100%;
    min-width:800px;
    border-collapse: collapse;
    background:white;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
    font-size:1em;
}
th,td{
    padding:16px 12px;
    border:1px solid #ccc;
    text-align:center;
    vertical-align: middle;
}
th{
    background:#2980b9;
    color:white;
    font-size:1.05em;
}
tr:nth-child(even){
    background:#f9f9f9;
}

/* === CORRECTION INPUTS FORMATION ET MOT DE PASSE === */
input[type="text"], input[type="password"]{
    width: 100%;       /* occupe toute la cellule */
    min-width: 150px;  /* largeur minimale pour le texte */
    padding: 10px;     /* plus de hauteur */
    font-size: 1em;    /* texte visible */
    border-radius: 5px;
    border: 1px solid #aaa;
    box-sizing: border-box;  /* padding inclus dans largeur */
    text-align: center;
}

button{
    padding:8px 14px;
    margin:2px;
    border:none;
    border-radius:5px;
    background:#27ae60;
    color:white;
    cursor:pointer;
    font-size:0.95em;
    transition:0.2s;
}
button:hover{
    background:#1e8449;
}
button.delete{
    background:#c0392b;
}
button.delete:hover{
    background:#922b21;
}
</style>
</head>
<body>

<h1>Administration TechNova</h1>
<p id="compteur">Nombre d’étudiants inscrits : 0</p>

<div class="table-container">
<table id="tableEtudiants">
<tr>
<th>Nom</th>
<th>Formation</th>
<th>Matricule</th>
<th>Mot de passe</th>
<th>Actions</th>
</tr>
</table>
</div>

<script>
// Récupérer les étudiants depuis localStorage
function getEtudiants(){
    return JSON.parse(localStorage.getItem("technova_etudiants")) || [];
}

// Sauvegarder étudiants dans localStorage
function saveEtudiants(etudiants){
    localStorage.setItem("technova_etudiants", JSON.stringify(etudiants));
}

// Afficher les étudiants
function afficherEtudiants(){
    let etudiants = getEtudiants();
    let table = document.getElementById("tableEtudiants");
    table.innerHTML = `
    <tr>
    <th>Nom</th>
    <th>Formation</th>
    <th>Matricule</th>
    <th>Mot de passe</th>
    <th>Actions</th>
    </tr>
    `;
    document.getElementById("compteur").innerText = `Nombre d’étudiants inscrits : ${etudiants.length}`;
    
    etudiants.forEach((e,index)=>{
        let nom = e.nom || "—";
        let formation = e.formation || "—";
        let matricule = e.matricule || "—";
        let password = e.password || "—";
        
        table.innerHTML += `
        <tr>
        <td><input type="text" value="${nom}" id="nom${index}"></td>
        <td><input type="text" value="${formation}" id="formation${index}"></td>
        <td>${matricule}</td>
        <td><input type="password" value="${password}" id="password${index}"></td>
        <td>
            <button onclick="modifierEtudiant(${index})">Modifier</button>
            <button class="delete" onclick="supprimerEtudiant(${index})">Supprimer</button>
        </td>
        </tr>
        `;
    });
}

// Modifier un étudiant
function modifierEtudiant(index){
    let etudiants = getEtudiants();
    etudiants[index].nom = document.getElementById(`nom${index}`).value.trim() || "—";
    etudiants[index].formation = document.getElementById(`formation${index}`).value.trim() || "—";
    etudiants[index].password = document.getElementById(`password${index}`).value.trim() || "—";
    saveEtudiants(etudiants);
    alert("Informations modifiées !");
    afficherEtudiants();
}

// Supprimer un étudiant
function supprimerEtudiant(index){
    if(confirm("Voulez-vous vraiment supprimer cet étudiant ?")){
        let etudiants = getEtudiants();
        etudiants.splice(index,1);
        saveEtudiants(etudiants);
        afficherEtudiants();
    }
}

// Charger au démarrage
window.onload = afficherEtudiants;
</script>

</body>
</html>
